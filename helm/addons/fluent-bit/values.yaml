config:
  service: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Daemon        off
        Parsers_File  parsers.conf

  inputs: |
    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        Parser            docker
        Tag               kube.*
        Refresh_Interval  5
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        # Merge_Log On: parsea el campo `log` (que ya es JSON gracias a structlog)
        # y promueve sus keys al nivel raíz del evento. Sin esto, las búsquedas en
        # Kibana tendrían que ser sobre `log.event`, `log.path`, etc.
        Merge_Log           On
        # Merge_Log_Trim On: elimina el campo `log` después del merge — evita la
        # duplicación de datos en cada documento de Elasticsearch.
        Merge_Log_Trim      On
        # K8S-Logging.Parser On: permite que un Pod sobreescriba el parser usado
        # via annotation `fluentbit.io/parser`. Apps que NO usan structlog
        # (terceros, sidecars) pueden declarar un parser custom.
        K8S-Logging.Parser  On
        # Anotamos cada evento con el nombre/namespace del pod — base para
        # filtrar en Kibana por app/env.
        Annotations         Off
        Labels              On

  outputs: |
    [OUTPUT]
        Name            es
        Match           kube.*
        Host            elasticsearch-master
        Port            9200
        Index           k8s
        Logstash_Format On
        Logstash_Prefix k8s
        Replace_Dots    On
        Retry_Limit     False
        tls             Off
        tls.verify      Off

# DaemonSet must run on every node regardless of taints.
tolerations:
- operator: Exists
