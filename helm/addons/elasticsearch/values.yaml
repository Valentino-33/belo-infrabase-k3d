replicas: 1
minimumMasterNodes: 1

# Single-node cluster: el readiness probe default exige status=green, pero
# cualquier índice creado con number_of_replicas>=1 (default de ES) deja
# shards huérfanos al no haber segundo nodo → cluster yellow permanente y
# el pod nunca pasa a Ready, trabando make cluster-start. Aceptamos yellow.
clusterHealthCheckParams: "wait_for_status=yellow&timeout=1s"

esJavaOpts: "-Xmx512m -Xms512m"

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

volumeClaimTemplate:
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi

persistence:
  enabled: true

# Single-node cluster needs soft anti-affinity.
antiAffinity: soft

# Disable TLS and security for local dev.
createCert: false
secret:
  enabled: false

esConfig:
  elasticsearch.yml: |
    xpack.security.enabled: false
    xpack.security.transport.ssl.enabled: false

nodeSelector:
  role: statefulls
tolerations:
- key: workload
  value: statefulls
  operator: Equal
  effect: NoSchedule
