# PipelineRun manual para demo sin webhook de GitHub.
# Usar: make pipeline-run APP=webserver-api01 TAG=v0.1.0
# O con envsubst: APP=webserver-api01 TAG=v0.1.0 DOCKERHUB_USER=user envsubst < pipelinerun-manual.yaml | kubectl create -f -
#
# El nombre del PipelineRun es determinístico: <app>-pipelinerun-<tag>
# Re-correr con el mismo TAG falla con AlreadyExists — usar otro TAG
# o eliminar el run anterior con: kubectl delete pipelinerun <name> -n tekton-pipelines
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: ${APP}-pipelinerun-${TAG}
  namespace: tekton-pipelines
spec:
  pipelineRef:
    name: pythonapps-pipeline
  taskRunTemplate:
    serviceAccountName: tekton-pipeline-runner
    podTemplate:
      tolerations:
      - key: workload
        value: cicd
        operator: Equal
        effect: NoSchedule
      nodeSelector:
        role: cicd
  params:
  - name: repo-url
    value: https://github.com/Valentino-33/${APP}
  - name: revision
    value: main
  - name: app-name
    value: ${APP}
  - name: image-tag
    value: ${TAG}
  - name: image-full
    value: docker.io/${DOCKERHUB_USER}/${APP}:${TAG}
  - name: environment
    value: dev
  - name: strategy
    value: bluegreen
  - name: gitops-repo-url
    value: https://github.com/Valentino-33/belo-infrabase-k3d
  - name: base-url
    value: "http://${APP}-stable.dev.svc.cluster.local:8000"
  - name: preview-url
    value: "http://${APP}-preview.dev.svc.cluster.local:8000"
  workspaces:
  - name: source
    volumeClaimTemplate:
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: local-path
        resources:
          requests:
            storage: 2Gi
  - name: gitops
    volumeClaimTemplate:
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: local-path
        resources:
          requests:
            storage: 1Gi
