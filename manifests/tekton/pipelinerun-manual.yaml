# PipelineRun manual del release pipeline (sin webhook GitHub).
# Usar: make pipeline-run APP=webserver-api01 TAG=v0.1.0
# O con envsubst: APP=... TAG=... DOCKERHUB_USER=... envsubst < pipelinerun-manual.yaml | kubectl create -f -
#
# Los params son los que pythonapps-pipeline declara — no más, no menos.
# Mantener sincronizado con charts/pythonapps/templates/pipeline-templates/pipeline-pythonapps.yaml.
#
# Nota sobre run-load-test: este manifiesto manual NO lo declara, así que toma el
# default "false" del Pipeline (skipea k6, auto-promote). Para correr k6 desde
# este path manual, agregá:
#   - name: run-load-test
#     value: "true"
#
# Nombre determinístico: <app>-pipelinerun-<tag>. Re-correr con el mismo TAG
# falla con AlreadyExists — usar otro TAG o eliminar el run anterior con:
#   kubectl delete pipelinerun <name> -n tekton-pipelines
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: ${APP}-pipelinerun-${TAG}
  namespace: tekton-pipelines
spec:
  pipelineRef:
    name: pythonapps-pipeline
  taskRunTemplate:
    serviceAccountName: tekton-pipeline-runner
    podTemplate:
      tolerations:
      - key: workload
        value: cicd
        operator: Equal
        effect: NoSchedule
      nodeSelector:
        role: cicd
  params:
  - name: repo-url
    value: https://github.com/Valentino-33/${APP}
  - name: revision
    value: main
  - name: app-name
    value: ${APP}
  - name: image-tag
    value: ${TAG}
  - name: image-full
    value: docker.io/${DOCKERHUB_USER}/${APP}:${TAG}
  - name: environments
    value: dev
  - name: gitops-repo-url
    value: https://github.com/Valentino-33/belo-infrabase-k3d
  workspaces:
  - name: source
    volumeClaimTemplate:
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: local-path
        resources:
          requests:
            storage: 2Gi
  - name: gitops
    volumeClaimTemplate:
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: local-path
        resources:
          requests:
            storage: 1Gi
