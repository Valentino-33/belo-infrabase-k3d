{{- if .Values.tekton.enabled }}
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: promote-or-rollback
  namespace: tekton-pipelines
spec:
  params:
  - name: app-name
    type: string
  - name: environments
    type: string
    default: dev
  - name: strategy
    type: string
    default: ""
  - name: outcome
    type: string
    default: passed
  steps:
  - name: promote-or-abort
    image: bitnami/kubectl:latest
    script: |
      #!/bin/sh
      set -e
      PRIMARY_ENV=$(echo "$(params.environments)" | cut -d',' -f1 | tr -d ' ')
      APP="$(params.app-name)"
      NS="$PRIMARY_ENV"
      STRATEGY="$(params.strategy)"
      OUTCOME="$(params.outcome)"
      echo "=== promote-or-rollback: app=$APP env=$NS strategy=$STRATEGY outcome=$OUTCOME ==="

      # Production gate: no auto-promote. Leave annotation and exit.
      if [ "$NS" = "production" ]; then
        if [ "$OUTCOME" = "passed" ]; then
          echo "PRODUCTION GATE: tests passed. Manual sync and promote required."
          echo "  1. ArgoCD: sync webserver application in production namespace"
          echo "  2. After Rollout is Paused: kubectl argo rollouts promote $APP -n production"
          kubectl annotate application "${APP}-production" -n argocd \
            belo/pending-promote="true" \
            belo/promote-reason="load-test-passed" \
            --overwrite 2>/dev/null || true
        else
          echo "PRODUCTION GATE: tests FAILED. Gitops values NOT reverted automatically."
          echo "  Review and manually revert if needed."
          kubectl annotate application "${APP}-production" -n argocd \
            belo/pending-promote="false" \
            belo/promote-reason="load-test-failed" \
            --overwrite 2>/dev/null || true
        fi
        exit 0
      fi

      # Download kubectl-argo-rollouts plugin
      if ! command -v kubectl-argo-rollouts >/dev/null 2>&1; then
        PLUGIN_URL="https://github.com/argoproj/argo-rollouts/releases/download/v1.7.2/kubectl-argo-rollouts-linux-amd64"
        echo "Downloading kubectl-argo-rollouts..."
        curl -sL "$PLUGIN_URL" -o /tmp/kubectl-argo-rollouts
        chmod +x /tmp/kubectl-argo-rollouts
        mv /tmp/kubectl-argo-rollouts /usr/local/bin/kubectl-argo-rollouts
      fi

      case "$STRATEGY" in
        rollingupdate)
          if [ "$OUTCOME" = "failed" ]; then
            echo "RollingUpdate: FAILED â€” rolling back"
            kubectl argo rollouts undo "$APP" -n "$NS" || true
          else
            echo "RollingUpdate: PASSED â€” completes automatically"
          fi
          ;;
        bluegreen)
          if [ "$OUTCOME" = "failed" ]; then
            echo "BlueGreen: FAILED â€” aborting (keeping stable blue)"
            kubectl argo rollouts abort "$APP" -n "$NS"
          else
            echo "BlueGreen: PASSED â€” promoting green to stable"
            kubectl argo rollouts promote "$APP" -n "$NS"
          fi
          ;;
        canary)
          if [ "$OUTCOME" = "failed" ]; then
            echo "Canary: FAILED â€” aborting"
            kubectl argo rollouts abort "$APP" -n "$NS"
          else
            echo "Canary: PASSED â€” promoting to 100%"
            kubectl argo rollouts promote "$APP" -n "$NS" --full
          fi
          ;;
        *)
          echo "WARN: unknown strategy '$STRATEGY' â€” no action taken"
          ;;
      esac
      echo "=== Done ==="
{{- end }}
