{{- if .Values.tekton.enabled }}
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: promote-or-rollback
  namespace: tekton-pipelines
spec:
  description: |
    Stage 6 — dueño de la verdad del release. Patches directos al Rollout
    según outcome + strategy. Sin plugin kubectl-argo-rollouts (los mismos
    patches que el plugin emite internamente). Verifica transición a
    Healthy (passed) o Degraded (failed).
  params:
  - name: app-name
    type: string
  - name: environments
    type: string
    default: dev
  - name: strategy
    type: string
    default: ""
  - name: outcome
    type: string
    default: passed
  stepTemplate:
    env:
    - name: HOME
      value: /tekton/home
    securityContext:
      runAsNonRoot: true
      runAsUser: 65532
      runAsGroup: 65532
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      seccompProfile:
        type: RuntimeDefault
  steps:
  - name: promote-or-abort
    image: bitnami/kubectl:latest
    script: |
      #!/bin/sh
      set -e
      PRIMARY_ENV=$(echo "$(params.environments)" | cut -d',' -f1 | tr -d ' ')
      APP="$(params.app-name)"
      NS="${APP}-${PRIMARY_ENV}"
      ROLLOUT="${APP}-${PRIMARY_ENV}"
      STRATEGY="$(params.strategy)"
      OUTCOME="$(params.outcome)"
      TIMEOUT=180

      echo "================================================================"
      echo "  STAGE 6 — promote-or-rollback"
      echo "================================================================"
      echo "  Rollout:    $ROLLOUT"
      echo "  Namespace:  $NS"
      echo "  Strategy:   $STRATEGY"
      echo "  Outcome:    $OUTCOME (de Stage 5 load test)"
      echo "  Phase target: Healthy (si passed) o Degraded (si failed)"
      echo "  Timeout:    ${TIMEOUT}s"
      echo "================================================================"

      # Production gate: no auto-promote — annotate la ArgoCD app y salir.
      if [ "$PRIMARY_ENV" = "production" ]; then
        echo "→ PRODUCTION GATE detectado — NO auto-promote."
        if [ "$OUTCOME" = "passed" ]; then
          echo "  ✓ Tests PASSED. Annotation belo/pending-promote=true agregada."
          echo "  Sync manual requerido: ArgoCD UI → ${APP}-production → SYNC"
          kubectl annotate application "${APP}-production" -n argocd \
            belo/pending-promote="true" \
            belo/promote-reason="load-test-passed" \
            --overwrite 2>/dev/null || true
        else
          echo "  ✗ Tests FAILED. Annotation belo/pending-promote=false."
          kubectl annotate application "${APP}-production" -n argocd \
            belo/pending-promote="false" \
            belo/promote-reason="load-test-failed" \
            --overwrite 2>/dev/null || true
        fi
        echo "================================================================"
        echo "  Stage 6 OK (production gate sin auto-action)"
        echo "================================================================"
        exit 0
      fi

      wait_phase() {
        EXPECTED="$1"
        ELAPSED=0
        while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
          PHASE=$(kubectl get rollout "$ROLLOUT" -n "$NS" -o jsonpath='{.status.phase}' 2>/dev/null || echo "Unknown")
          ACTIVE=$(kubectl get rollout "$ROLLOUT" -n "$NS" -o jsonpath='{.status.blueGreen.activeSelector}' 2>/dev/null || echo "")
          STABLE=$(kubectl get rollout "$ROLLOUT" -n "$NS" -o jsonpath='{.status.stableRS}' 2>/dev/null || echo "")
          echo "  [${ELAPSED}s] phase=$PHASE stableRS=${STABLE:0:10} activeSelector=${ACTIVE:0:10} (esperando $EXPECTED)"
          [ "$PHASE" = "$EXPECTED" ] && return 0
          sleep 5
          ELAPSED=$((ELAPSED + 5))
        done
        echo "  ✗ TIMEOUT: rollout $ROLLOUT no llegó a phase=$EXPECTED en ${TIMEOUT}s (último: $PHASE)"
        return 1
      }

      case "$STRATEGY" in
        rollingupdate)
          if [ "$OUTCOME" = "failed" ]; then
            echo "→ RollingUpdate FAILED → kubectl patch spec.abort=true"
            kubectl patch rollout "$ROLLOUT" -n "$NS" --type=merge -p '{"spec":{"abort":true}}'
            wait_phase "Degraded" || exit 1
            echo "  ✓ Rollout abortado, stable intacto"
          else
            echo "→ RollingUpdate PASSED → no-op (el RS nuevo ya es stable)"
            wait_phase "Healthy" || exit 1
            echo "  ✓ Rollout Healthy"
          fi
          ;;
        bluegreen)
          if [ "$OUTCOME" = "failed" ]; then
            echo "→ BlueGreen FAILED → kubectl patch spec.abort=true"
            echo "  Esto destruye el green RS, mantiene blue como stable (rollback efectivo)."
            kubectl patch rollout "$ROLLOUT" -n "$NS" --type=merge -p '{"spec":{"abort":true}}'
            wait_phase "Degraded" || exit 1
            echo "  ✓ Green destruido, blue queda sirviendo"
          else
            echo "→ BlueGreen PASSED → patch status.pauseConditions=null"
            echo "  Esto switchea el active svc del blue al green, blue scale-down 30s después."
            kubectl patch rollout "$ROLLOUT" -n "$NS" --subresource=status --type=merge \
              -p '{"status":{"pauseConditions":null}}'
            wait_phase "Healthy" || exit 1
            echo "  ✓ Switchover completo — green ahora es stable"
          fi
          ;;
        canary)
          if [ "$OUTCOME" = "failed" ]; then
            echo "→ Canary FAILED → kubectl patch spec.abort=true"
            kubectl patch rollout "$ROLLOUT" -n "$NS" --type=merge -p '{"spec":{"abort":true}}'
            wait_phase "Degraded" || exit 1
            echo "  ✓ Canary abortado, stable queda sirviendo"
          else
            echo "→ Canary PASSED → patch status.promoteFull=true"
            echo "  Esto salta los steps restantes del canary y va directo a 100%."
            kubectl patch rollout "$ROLLOUT" -n "$NS" --subresource=status --type=merge \
              -p '{"status":{"promoteFull":true}}'
            wait_phase "Healthy" || exit 1
            echo "  ✓ Canary 100% — ahora es stable"
          fi
          ;;
        *)
          echo "  ⚠ WARN: strategy desconocida '$STRATEGY' — no action"
          ;;
      esac

      echo ""
      echo "================================================================"
      echo "  ✓ Stage 6 OK"
      echo "================================================================"
{{- end }}
