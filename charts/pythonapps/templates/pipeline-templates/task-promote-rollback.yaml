{{- if .Values.tekton.enabled }}
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: promote-or-rollback
  namespace: tekton-pipelines
spec:
  description: |
    Stage 6 — promote-or-rollback. Detecta automáticamente entre dos modos:

      MODO ENTERPRISE (analysis.enabled=true en el chart):
        El Rollout tiene prePromotionAnalysis (BG) o steps[*].analysis (Canary)
        configurados → Argo Rollouts es el dueño del promote. El controller
        consulta Prometheus, decide promote/abort, y si falla hace rollback
        automático antes del scaleDown del blue (BG) o aborta el canary.
        Este task solo OBSERVA: espera phase=Healthy (success) o Degraded (fail).

      MODO LEGACY (analysis.enabled=false o no soportado):
        Este task hace los patches directos (mismos que emite el plugin
        kubectl-argo-rollouts internamente). Promote o abort según `outcome`
        del Stage 5.

    La detección es por introspección del Rollout vivo — no requiere pasar
    params extra al pipeline.
  params:
  - name: app-name
    type: string
  - name: environments
    type: string
    default: dev
  - name: strategy
    type: string
    default: ""
  - name: outcome
    type: string
    default: passed
  - name: enterprise-timeout
    type: string
    default: "600"
    description: |
      Timeout (segundos) para esperar phase=Healthy/Degraded en MODO ENTERPRISE.
      Default 600s (10min): canary multi-step con 3 análisis de ~60s c/u + propagación.
      Para apps con SLOs lentos, override desde el TriggerTemplate.
  stepTemplate:
    env:
    - name: HOME
      value: /tekton/home
    securityContext:
      runAsNonRoot: true
      runAsUser: 65532
      runAsGroup: 65532
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      seccompProfile:
        type: RuntimeDefault
  steps:
  - name: promote-or-abort
    image: bitnami/kubectl:latest
    script: |
      #!/bin/sh
      set -e
      PRIMARY_ENV=$(echo "$(params.environments)" | cut -d',' -f1 | tr -d ' ')
      APP="$(params.app-name)"
      NS="${APP}-${PRIMARY_ENV}"
      ROLLOUT="${APP}-${PRIMARY_ENV}"
      STRATEGY="$(params.strategy)"
      OUTCOME="$(params.outcome)"
      LEGACY_TIMEOUT=180
      ENTERPRISE_TIMEOUT=$(params.enterprise-timeout)

      # ─────────────────────────────────────────────────────────────────────
      # Detección de modo: enterprise (Argo decide) vs legacy (pipeline decide)
      # ─────────────────────────────────────────────────────────────────────
      # BG → buscar prePromotionAnalysis.templates definida.
      # Canary → buscar steps con .analysis (no solo pause:{}).
      MODE="legacy"
      case "$STRATEGY" in
        bluegreen)
          HAS_ANALYSIS=$(kubectl get rollout "$ROLLOUT" -n "$NS" \
            -o jsonpath='{.spec.strategy.blueGreen.prePromotionAnalysis.templates[0].templateName}' 2>/dev/null || echo "")
          [ -n "$HAS_ANALYSIS" ] && MODE="enterprise"
          ;;
        canary)
          # jsonpath con filtro: contar steps que tienen analysis. Si > 0 → enterprise.
          ANALYSIS_STEPS=$(kubectl get rollout "$ROLLOUT" -n "$NS" \
            -o jsonpath='{.spec.strategy.canary.steps[?(@.analysis)].analysis.templates[0].templateName}' 2>/dev/null || echo "")
          [ -n "$ANALYSIS_STEPS" ] && MODE="enterprise"
          ;;
      esac

      echo "================================================================"
      echo "  STAGE 6 — promote-or-rollback"
      echo "================================================================"
      echo "  Rollout:    $ROLLOUT"
      echo "  Namespace:  $NS"
      echo "  Strategy:   $STRATEGY"
      echo "  Mode:       $MODE"
      if [ "$MODE" = "enterprise" ]; then
        echo "              (Argo Rollouts AnalysisRun controla el promote;"
        echo "               este task solo observa phase=Healthy/Degraded)"
        echo "  Timeout:    ${ENTERPRISE_TIMEOUT}s"
      else
        echo "  Outcome:    $OUTCOME (de Stage 5 load test)"
        echo "  Timeout:    ${LEGACY_TIMEOUT}s"
      fi
      echo "================================================================"

      # Production gate: no auto-promote — annotate la ArgoCD app y salir.
      if [ "$PRIMARY_ENV" = "production" ]; then
        echo "→ PRODUCTION GATE detectado — NO auto-promote."
        if [ "$OUTCOME" = "passed" ]; then
          echo "  ✓ Tests PASSED. Annotation belo/pending-promote=true agregada."
          echo "  Sync manual requerido: ArgoCD UI → ${APP}-production → SYNC"
          kubectl annotate application "${APP}-production" -n argocd \
            belo/pending-promote="true" \
            belo/promote-reason="load-test-passed" \
            --overwrite 2>/dev/null || true
        else
          echo "  ✗ Tests FAILED. Annotation belo/pending-promote=false."
          kubectl annotate application "${APP}-production" -n argocd \
            belo/pending-promote="false" \
            belo/promote-reason="load-test-failed" \
            --overwrite 2>/dev/null || true
        fi
        echo "================================================================"
        echo "  Stage 6 OK (production gate sin auto-action)"
        echo "================================================================"
        exit 0
      fi

      # wait_terminal espera Healthy o Degraded (cualquier fase terminal) y devuelve
      # 0/1 según corresponda. Útil en modo enterprise donde no sabemos a priori
      # cuál fase va a llegar — Argo decide via AnalysisRun.
      wait_terminal() {
        TIMEOUT="$1"
        ELAPSED=0
        while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
          PHASE=$(kubectl get rollout "$ROLLOUT" -n "$NS" -o jsonpath='{.status.phase}' 2>/dev/null || echo "Unknown")
          MSG=$(kubectl get rollout "$ROLLOUT" -n "$NS" -o jsonpath='{.status.message}' 2>/dev/null || echo "")
          STEP=$(kubectl get rollout "$ROLLOUT" -n "$NS" -o jsonpath='{.status.currentStepIndex}' 2>/dev/null || echo "")
          echo "  [${ELAPSED}s] phase=$PHASE step=$STEP msg=$(echo "$MSG" | head -c 80)"
          case "$PHASE" in
            Healthy)   return 0 ;;
            Degraded)  return 1 ;;
          esac
          sleep 10
          ELAPSED=$((ELAPSED + 10))
        done
        echo "  ✗ TIMEOUT: rollout no llegó a fase terminal en ${TIMEOUT}s (último: $PHASE)"
        return 1
      }

      # wait_phase: usada por el path LEGACY (sabemos qué phase esperar).
      wait_phase() {
        EXPECTED="$1"
        ELAPSED=0
        while [ "$ELAPSED" -lt "$LEGACY_TIMEOUT" ]; do
          PHASE=$(kubectl get rollout "$ROLLOUT" -n "$NS" -o jsonpath='{.status.phase}' 2>/dev/null || echo "Unknown")
          ACTIVE=$(kubectl get rollout "$ROLLOUT" -n "$NS" -o jsonpath='{.status.blueGreen.activeSelector}' 2>/dev/null || echo "")
          STABLE=$(kubectl get rollout "$ROLLOUT" -n "$NS" -o jsonpath='{.status.stableRS}' 2>/dev/null || echo "")
          echo "  [${ELAPSED}s] phase=$PHASE stableRS=${STABLE:0:10} activeSelector=${ACTIVE:0:10} (esperando $EXPECTED)"
          [ "$PHASE" = "$EXPECTED" ] && return 0
          sleep 5
          ELAPSED=$((ELAPSED + 5))
        done
        echo "  ✗ TIMEOUT: rollout $ROLLOUT no llegó a phase=$EXPECTED en ${LEGACY_TIMEOUT}s (último: $PHASE)"
        return 1
      }

      # ─────────────────────────────────────────────────────────────────────
      # MODO ENTERPRISE — Argo Rollouts decide via AnalysisRun
      # ─────────────────────────────────────────────────────────────────────
      if [ "$MODE" = "enterprise" ]; then
        echo "→ Observando Rollout (Argo Rollouts controla promote/abort via análisis)"
        if wait_terminal "$ENTERPRISE_TIMEOUT"; then
          echo ""
          echo "================================================================"
          echo "  ✓ Stage 6 OK — Rollout Healthy (análisis Prometheus pasó)"
          echo "================================================================"
          exit 0
        else
          echo ""
          # Listar AnalysisRuns del Rollout para mostrar cuál falló y por qué.
          echo "→ AnalysisRuns asociados al Rollout:"
          kubectl get analysisrun -n "$NS" -l "rollouts-pod-template-hash" \
            -o custom-columns=NAME:.metadata.name,PHASE:.status.phase,MESSAGE:.status.message 2>/dev/null || true
          echo ""
          echo "================================================================"
          echo "  ✗ Stage 6 — Rollout Degraded (análisis Prometheus FALLÓ)"
          echo "================================================================"
          echo "  Argo Rollouts hizo abort automático. Stable RS sigue sirviendo."
          echo "  Para inspeccionar: kubectl describe analysisrun -n $NS"
          exit 1
        fi
      fi

      # ─────────────────────────────────────────────────────────────────────
      # MODO LEGACY — el pipeline patchea según $OUTCOME del Stage 5
      # ─────────────────────────────────────────────────────────────────────
      case "$STRATEGY" in
        rollingupdate)
          if [ "$OUTCOME" = "failed" ]; then
            echo "→ RollingUpdate FAILED → kubectl patch spec.abort=true"
            kubectl patch rollout "$ROLLOUT" -n "$NS" --type=merge -p '{"spec":{"abort":true}}'
            wait_phase "Degraded" || exit 1
            echo "  ✓ Rollout abortado, stable intacto"
          else
            echo "→ RollingUpdate PASSED → no-op (el RS nuevo ya es stable)"
            wait_phase "Healthy" || exit 1
            echo "  ✓ Rollout Healthy"
          fi
          ;;
        bluegreen)
          if [ "$OUTCOME" = "failed" ]; then
            echo "→ BlueGreen FAILED → kubectl patch spec.abort=true"
            echo "  Esto destruye el green RS, mantiene blue como stable (rollback efectivo)."
            kubectl patch rollout "$ROLLOUT" -n "$NS" --type=merge -p '{"spec":{"abort":true}}'
            wait_phase "Degraded" || exit 1
            echo "  ✓ Green destruido, blue queda sirviendo"
          else
            echo "→ BlueGreen PASSED → patch status.pauseConditions=null"
            echo "  Esto switchea el active svc del blue al green, blue scale-down 30s después."
            kubectl patch rollout "$ROLLOUT" -n "$NS" --subresource=status --type=merge \
              -p '{"status":{"pauseConditions":null}}'
            wait_phase "Healthy" || exit 1
            echo "  ✓ Switchover completo — green ahora es stable"
          fi
          ;;
        canary)
          if [ "$OUTCOME" = "failed" ]; then
            echo "→ Canary FAILED → kubectl patch spec.abort=true"
            kubectl patch rollout "$ROLLOUT" -n "$NS" --type=merge -p '{"spec":{"abort":true}}'
            wait_phase "Degraded" || exit 1
            echo "  ✓ Canary abortado, stable queda sirviendo"
          else
            echo "→ Canary PASSED → patch status.promoteFull=true"
            echo "  Esto salta los steps restantes del canary y va directo a 100%."
            kubectl patch rollout "$ROLLOUT" -n "$NS" --subresource=status --type=merge \
              -p '{"status":{"promoteFull":true}}'
            wait_phase "Healthy" || exit 1
            echo "  ✓ Canary 100% — ahora es stable"
          fi
          ;;
        *)
          echo "  ⚠ WARN: strategy desconocida '$STRATEGY' — no action"
          ;;
      esac

      echo ""
      echo "================================================================"
      echo "  ✓ Stage 6 OK"
      echo "================================================================"
{{- end }}
