{{- if .Values.tekton.enabled }}
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: promote-or-rollback
  namespace: tekton-pipelines
spec:
  params:
  - name: app-name
    type: string
  - name: environments
    type: string
    default: dev
  - name: strategy
    type: string
    default: ""
  - name: outcome
    type: string
    default: passed
  stepTemplate:
    env:
    - name: HOME
      value: /tekton/home
    securityContext:
      runAsNonRoot: true
      runAsUser: 65532
      runAsGroup: 65532
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      seccompProfile:
        type: RuntimeDefault
  steps:
  - name: promote-or-abort
    image: bitnami/kubectl:latest
    script: |
      #!/bin/sh
      set -e
      # Prepend $HOME/bin (where we install the kubectl-argo-rollouts plugin
      # as nonroot) without clobbering the image's default PATH.
      export PATH="$HOME/bin:$PATH"
      PRIMARY_ENV=$(echo "$(params.environments)" | cut -d',' -f1 | tr -d ' ')
      APP="$(params.app-name)"
      # namespace y nombre de rollout = app-name + env
      NS="${APP}-${PRIMARY_ENV}"
      ROLLOUT="${APP}-${PRIMARY_ENV}"
      STRATEGY="$(params.strategy)"
      OUTCOME="$(params.outcome)"
      echo "=== promote-or-rollback: rollout=$ROLLOUT ns=$NS strategy=$STRATEGY outcome=$OUTCOME ==="

      # Production gate: no auto-promote. Anotar ArgoCD app y salir.
      if [ "$PRIMARY_ENV" = "production" ]; then
        if [ "$OUTCOME" = "passed" ]; then
          echo "PRODUCTION GATE: tests passed. Manual sync and promote required."
          echo "  1. ArgoCD: sync ${APP}-production manually"
          echo "  2. After Rollout is Paused: kubectl argo rollouts promote $ROLLOUT -n $NS"
          kubectl annotate application "${APP}-production" -n argocd \
            belo/pending-promote="true" \
            belo/promote-reason="load-test-passed" \
            --overwrite 2>/dev/null || true
        else
          echo "PRODUCTION GATE: tests FAILED. Revert gitops values manually if needed."
          kubectl annotate application "${APP}-production" -n argocd \
            belo/pending-promote="false" \
            belo/promote-reason="load-test-failed" \
            --overwrite 2>/dev/null || true
        fi
        exit 0
      fi

      # Download kubectl-argo-rollouts plugin (nonroot — instalar bajo $HOME/bin que ya está en PATH)
      if ! command -v kubectl-argo-rollouts >/dev/null 2>&1; then
        PLUGIN_URL="https://github.com/argoproj/argo-rollouts/releases/download/v1.7.2/kubectl-argo-rollouts-linux-amd64"
        echo "Downloading kubectl-argo-rollouts..."
        mkdir -p "$HOME/bin"
        curl -sL "$PLUGIN_URL" -o "$HOME/bin/kubectl-argo-rollouts"
        chmod +x "$HOME/bin/kubectl-argo-rollouts"
      fi

      case "$STRATEGY" in
        rollingupdate)
          if [ "$OUTCOME" = "failed" ]; then
            echo "RollingUpdate: FAILED — rolling back"
            kubectl argo rollouts undo "$ROLLOUT" -n "$NS" || true
          else
            echo "RollingUpdate: PASSED — completes automatically"
          fi
          ;;
        bluegreen)
          if [ "$OUTCOME" = "failed" ]; then
            echo "BlueGreen: FAILED — aborting (keeping stable blue)"
            kubectl argo rollouts abort "$ROLLOUT" -n "$NS"
          else
            echo "BlueGreen: PASSED — promoting green to stable"
            kubectl argo rollouts promote "$ROLLOUT" -n "$NS"
          fi
          ;;
        canary)
          if [ "$OUTCOME" = "failed" ]; then
            echo "Canary: FAILED — aborting"
            kubectl argo rollouts abort "$ROLLOUT" -n "$NS"
          else
            echo "Canary: PASSED — promoting to 100%"
            kubectl argo rollouts promote "$ROLLOUT" -n "$NS" --full
          fi
          ;;
        *)
          echo "WARN: unknown strategy '$STRATEGY' — no action taken"
          ;;
      esac
      echo "=== Done ==="
{{- end }}
