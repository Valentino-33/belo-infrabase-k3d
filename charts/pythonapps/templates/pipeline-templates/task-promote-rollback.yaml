{{- if .Values.tekton.enabled }}
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: promote-or-rollback
  namespace: tekton-pipelines
spec:
  params:
  - name: app-name
    type: string
  - name: environments
    type: string
    default: dev
  - name: strategy
    type: string
    default: ""
  - name: outcome
    type: string
    default: passed
  stepTemplate:
    env:
    - name: HOME
      value: /tekton/home
    securityContext:
      runAsNonRoot: true
      runAsUser: 65532
      runAsGroup: 65532
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      seccompProfile:
        type: RuntimeDefault
  steps:
  - name: promote-or-abort
    image: bitnami/kubectl:latest
    script: |
      #!/bin/sh
      set -e
      PRIMARY_ENV=$(echo "$(params.environments)" | cut -d',' -f1 | tr -d ' ')
      APP="$(params.app-name)"
      NS="${APP}-${PRIMARY_ENV}"
      ROLLOUT="${APP}-${PRIMARY_ENV}"
      STRATEGY="$(params.strategy)"
      OUTCOME="$(params.outcome)"
      TIMEOUT=180
      echo "=== promote-or-rollback: rollout=$ROLLOUT ns=$NS strategy=$STRATEGY outcome=$OUTCOME ==="

      # Production gate: no auto-promote ŌĆö annotate the ArgoCD app and exit.
      if [ "$PRIMARY_ENV" = "production" ]; then
        if [ "$OUTCOME" = "passed" ]; then
          echo "PRODUCTION GATE: tests passed. Manual sync and promote required."
          echo "  1. ArgoCD: sync ${APP}-production manually"
          echo "  2. After Rollout is Paused: patch status.pauseConditions=null"
          kubectl annotate application "${APP}-production" -n argocd \
            belo/pending-promote="true" \
            belo/promote-reason="load-test-passed" \
            --overwrite 2>/dev/null || true
        else
          echo "PRODUCTION GATE: tests FAILED. Revert gitops values manually if needed."
          kubectl annotate application "${APP}-production" -n argocd \
            belo/pending-promote="false" \
            belo/promote-reason="load-test-failed" \
            --overwrite 2>/dev/null || true
        fi
        exit 0
      fi

      # wait_phase EXPECTED ŌĆö block until rollout phase reaches EXPECTED (or timeout).
      wait_phase() {
        EXPECTED="$1"
        ELAPSED=0
        while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
          PHASE=$(kubectl get rollout "$ROLLOUT" -n "$NS" -o jsonpath='{.status.phase}' 2>/dev/null || echo "Unknown")
          ACTIVE=$(kubectl get rollout "$ROLLOUT" -n "$NS" -o jsonpath='{.status.blueGreen.activeSelector}' 2>/dev/null || echo "")
          STABLE=$(kubectl get rollout "$ROLLOUT" -n "$NS" -o jsonpath='{.status.stableRS}' 2>/dev/null || echo "")
          echo "  [${ELAPSED}s] phase=$PHASE stableRS=$STABLE active=$ACTIVE (waiting for $EXPECTED)"
          [ "$PHASE" = "$EXPECTED" ] && return 0
          sleep 5
          ELAPSED=$((ELAPSED + 5))
        done
        echo "ERROR: rollout $ROLLOUT did not reach phase=$EXPECTED in ${TIMEOUT}s (last phase=$PHASE)"
        return 1
      }

      # Implement the argo-rollouts plugin promote/abort actions via plain
      # kubectl patches ŌĆö same patches the plugin issues, no external binary
      # download required. Patches sourced from:
      # https://github.com/argoproj/argo-rollouts/blob/master/cmd/kubectl-argo-rollouts/commands/promote.go
      case "$STRATEGY" in
        rollingupdate)
          if [ "$OUTCOME" = "failed" ]; then
            echo "RollingUpdate: FAILED ŌĆö aborting"
            kubectl patch rollout "$ROLLOUT" -n "$NS" --type=merge -p '{"spec":{"abort":true}}'
            wait_phase "Degraded" || exit 1
          else
            echo "RollingUpdate: PASSED ŌĆö completes automatically"
            wait_phase "Healthy" || exit 1
          fi
          ;;
        bluegreen)
          if [ "$OUTCOME" = "failed" ]; then
            echo "BlueGreen: FAILED ŌĆö aborting (keeping stable blue)"
            kubectl patch rollout "$ROLLOUT" -n "$NS" --type=merge -p '{"spec":{"abort":true}}'
            wait_phase "Degraded" || exit 1
          else
            echo "BlueGreen: PASSED ŌĆö clearing pauseConditions to promote green to stable"
            kubectl patch rollout "$ROLLOUT" -n "$NS" --subresource=status --type=merge \
              -p '{"status":{"pauseConditions":null}}'
            wait_phase "Healthy" || exit 1
          fi
          ;;
        canary)
          if [ "$OUTCOME" = "failed" ]; then
            echo "Canary: FAILED ŌĆö aborting"
            kubectl patch rollout "$ROLLOUT" -n "$NS" --type=merge -p '{"spec":{"abort":true}}'
            wait_phase "Degraded" || exit 1
          else
            echo "Canary: PASSED ŌĆö setting promoteFull=true to skip remaining steps"
            kubectl patch rollout "$ROLLOUT" -n "$NS" --subresource=status --type=merge \
              -p '{"status":{"promoteFull":true}}'
            wait_phase "Healthy" || exit 1
          fi
          ;;
        *)
          echo "WARN: unknown strategy '$STRATEGY' ŌĆö no action taken"
          ;;
      esac
      echo "=== Done ==="
{{- end }}
