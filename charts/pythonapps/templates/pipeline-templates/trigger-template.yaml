{{- if .Values.tekton.enabled }}
# storageClassName: local-path (k3d default — no necesita provisioner externo)
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: pythonapps-trigger-template
  namespace: tekton-pipelines
spec:
  params:
  - name: repo-url
  - name: app-name
  - name: image-tag
  - name: revision
    default: main
  - name: environment
    default: dev
  - name: strategy
    default: rollingupdate
  resourcetemplates:
  - apiVersion: tekton.dev/v1
    kind: PipelineRun
    metadata:
      generateName: $(tt.params.app-name)-run-
      namespace: tekton-pipelines
    spec:
      pipelineRef:
        name: pythonapps-pipeline
      taskRunTemplate:
        # SA with RBAC to read Rollouts and ArgoCD Applications (stages 4 & 6).
        serviceAccountName: tekton-pipeline-runner
      podTemplate:
        tolerations:
        - key: workload
          value: cicd
          operator: Equal
          effect: NoSchedule
        nodeSelector:
          role: cicd
      params:
      - name: repo-url
        value: $(tt.params.repo-url)
      - name: app-name
        value: $(tt.params.app-name)
      - name: image-tag
        value: $(tt.params.image-tag)
      - name: revision
        value: $(tt.params.revision)
      - name: image-full
        value: "docker.io/{{ .Values.tekton.dockerhubUser }}/$(tt.params.app-name):$(tt.params.image-tag)"
      - name: environment
        value: $(tt.params.environment)
      - name: strategy
        value: $(tt.params.strategy)
      - name: gitops-repo-url
        value: "{{ .Values.tekton.gitopsRepoUrl }}"
      # Cluster-internal URLs for k6 load tests running inside the cluster.
      - name: base-url
        value: "http://$(tt.params.app-name)-stable.$(tt.params.environment).svc.cluster.local:8000"
      - name: preview-url
        value: "http://$(tt.params.app-name)-preview.$(tt.params.environment).svc.cluster.local:8000"
      workspaces:
      - name: source
        volumeClaimTemplate:
          spec:
            accessModes: [ReadWriteOnce]
            storageClassName: local-path
            resources:
              requests:
                storage: 2Gi
      - name: gitops
        volumeClaimTemplate:
          spec:
            accessModes: [ReadWriteOnce]
            storageClassName: local-path
            resources:
              requests:
                storage: 1Gi
{{- end }}
