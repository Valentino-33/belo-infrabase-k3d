{{- if .Values.tekton.enabled }}
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone-app
  namespace: tekton-pipelines
spec:
  params:
  - name: url
    type: string
  - name: revision
    type: string
    default: main
  workspaces:
  - name: output
  stepTemplate:
    env:
    - name: HOME
      value: /tekton/home
    securityContext:
      runAsNonRoot: true
      runAsUser: 65532
      runAsGroup: 65532
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      seccompProfile:
        type: RuntimeDefault
  steps:
  - name: clone
    image: alpine/git:latest
    script: |
      #!/bin/sh
      set -e
      DEST="$(workspaces.output.path)/src"
      git clone --depth 1 "$(params.url)" "$DEST" 2>/dev/null || true
      cd "$DEST"
      git fetch --depth 1 origin "$(params.revision)" 2>/dev/null || \
        git fetch origin "$(params.revision)"
      git checkout "$(params.revision)"
      echo "Clonado OK: $(params.url) @ $(params.revision)"
      ls -la "$DEST"
{{- end }}
