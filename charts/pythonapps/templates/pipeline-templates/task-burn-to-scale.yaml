{{- if .Values.tekton.enabled }}
# Burn-to-scale — usado por pythonapps-burn-pipeline (pipeline aparte del
# release, on-demand). Valida HPA scale-up bajo carga sostenida.
#
# Diseño: sidecar k6 quema CPU contra el stable svc; el step principal
# kubectl monitorea rollout.status.replicas cada 10s durante 180s.
# outcome=passed si MAX_REPLICAS > BASELINE en cualquier momento.
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: run-burn-to-scale
  namespace: tekton-pipelines
spec:
  description: |
    Burn pipeline (HPA capacity test). Sidecar k6 + step kubectl polling.
  params:
  - name: app-name
    type: string
  - name: environments
    type: string
    default: dev
  - name: strategy
    type: string
    default: ""
    description: "No usado por el Task — siempre targetea stable svc"
  - name: monitor-timeout-seconds
    type: string
    default: "180"
  results:
  - name: outcome
    description: "passed | failed | skipped (production)"
  - name: baseline-replicas
  - name: max-replicas
  workspaces:
  - name: source
  sidecars:
  - name: loadgen
    image: grafana/k6:latest
    workingDir: $(workspaces.source.path)
    securityContext:
      runAsNonRoot: true
      runAsUser: 65532
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      seccompProfile:
        type: RuntimeDefault
    env:
    - name: HOME
      value: /tekton/home
    script: |
      #!/bin/sh
      # Sleep inicial para que el step principal capture baseline ANTES de
      # generar carga.
      sleep 10

      PRIMARY_ENV=$(echo "$(params.environments)" | cut -d',' -f1 | tr -d ' ')
      APP="$(params.app-name)"
      NS="${APP}-${PRIMARY_ENV}"
      RELEASE="${APP}-${PRIMARY_ENV}"
      TARGET_URL="http://${RELEASE}-stable.${NS}.svc.cluster.local:8080"
      SCRIPT_PATH="$(workspaces.source.path)/src/loadtest/burn-to-scale.js"

      echo "================================================================"
      echo "  BURN sidecar — k6 loadgen"
      echo "================================================================"
      echo "  Target URL:   $TARGET_URL (stable svc)"
      echo "  Script:       $SCRIPT_PATH"
      echo "  Profile:      200 VUs sostenidos por 120s sin sleep"
      echo "================================================================"

      if [ ! -f "$SCRIPT_PATH" ]; then
        echo "  ✗ ERROR: $SCRIPT_PATH no existe en el repo de la app."
        echo "    Agregar loadtest/burn-to-scale.js."
        exit 1
      fi

      echo "→ Lanzando k6..."
      k6 run -e TARGET_URL="$TARGET_URL" "$SCRIPT_PATH" || true
      echo "  ✓ k6 burn finalizado"

      # Mantener vivo hasta que el step principal termine
      # (Tekton mata el sidecar cuando el último step exit).
      sleep 600
  stepTemplate:
    env:
    - name: HOME
      value: /tekton/home
    securityContext:
      runAsNonRoot: true
      runAsUser: 65532
      runAsGroup: 65532
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      seccompProfile:
        type: RuntimeDefault
  steps:
  - name: monitor-hpa
    image: bitnami/kubectl:latest
    script: |
      #!/bin/sh
      set -e
      PRIMARY_ENV=$(echo "$(params.environments)" | cut -d',' -f1 | tr -d ' ')
      APP="$(params.app-name)"
      NS="${APP}-${PRIMARY_ENV}"
      ROLLOUT="${APP}-${PRIMARY_ENV}"
      HPA="${APP}-${PRIMARY_ENV}"
      TIMEOUT=$(params.monitor-timeout-seconds)

      echo "================================================================"
      echo "  BURN — monitor-hpa step"
      echo "================================================================"
      echo "  Rollout:    $ROLLOUT"
      echo "  HPA:        $HPA"
      echo "  Namespace:  $NS"
      echo "  Timeout:    ${TIMEOUT}s"
      echo "  Success:    max_replicas > baseline_replicas"
      echo "================================================================"

      if [ "$PRIMARY_ENV" = "production" ]; then
        echo "  ⚠ PRODUCTION env — saltando burn (no quemamos CPU productiva)"
        printf "skipped" > "$(results.outcome.path)"
        printf "0" > "$(results.baseline-replicas.path)"
        printf "0" > "$(results.max-replicas.path)"
        exit 0
      fi

      if ! kubectl get hpa "$HPA" -n "$NS" >/dev/null 2>&1; then
        echo "  ✗ HPA $HPA NO EXISTE en $NS"
        echo "    Habilitar hpa.enabled=true en charts/pythonapps/apps/$APP/$PRIMARY_ENV/values.yaml"
        printf "failed" > "$(results.outcome.path)"
        printf "0" > "$(results.baseline-replicas.path)"
        printf "0" > "$(results.max-replicas.path)"
        exit 0
      fi

      get_replicas() {
        kubectl get rollout "$ROLLOUT" -n "$NS" \
          -o jsonpath='{.status.replicas}' 2>/dev/null || echo "0"
      }
      get_hpa_cpu() {
        kubectl get hpa "$HPA" -n "$NS" \
          -o jsonpath='{.status.currentCPUUtilizationPercentage}' 2>/dev/null \
          || echo "?"
      }

      BASELINE=$(get_replicas)
      [ -z "$BASELINE" ] && BASELINE=1
      printf "%s" "$BASELINE" > "$(results.baseline-replicas.path)"

      HPA_TARGET=$(kubectl get hpa $HPA -n $NS -o jsonpath='{.spec.metrics[0].resource.target.averageUtilization}')
      HPA_MIN=$(kubectl get hpa $HPA -n $NS -o jsonpath='{.spec.minReplicas}')
      HPA_MAX=$(kubectl get hpa $HPA -n $NS -o jsonpath='{.spec.maxReplicas}')

      echo "  Baseline replicas: $BASELINE"
      echo "  HPA target CPU:    ${HPA_TARGET}%"
      echo "  HPA min/max:       $HPA_MIN..$HPA_MAX"
      echo "→ Sidecar k6 va a empezar a generar carga en ~10s"
      echo "→ Polling cada 10s durante ${TIMEOUT}s..."
      echo "================================================================"

      MAX_SEEN=$BASELINE
      ELAPSED=0
      SCALED=0
      while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
        R=$(get_replicas)
        [ -z "$R" ] && R=$BASELINE
        if [ "$R" -gt "$MAX_SEEN" ]; then
          MAX_SEEN=$R
        fi
        if [ "$R" -gt "$BASELINE" ]; then
          SCALED=1
        fi
        CPU=$(get_hpa_cpu)
        echo "  [${ELAPSED}s] replicas=$R max_seen=$MAX_SEEN hpa.cpu=${CPU}%"
        sleep 10
        ELAPSED=$((ELAPSED + 10))
      done

      printf "%s" "$MAX_SEEN" > "$(results.max-replicas.path)"

      echo ""
      echo "================================================================"
      if [ "$SCALED" = "1" ]; then
        echo "  ✓ BURN PASSED — HPA escaló $BASELINE → $MAX_SEEN replicas"
        printf "passed" > "$(results.outcome.path)"
      else
        echo "  ✗ BURN FAILED — replicas nunca subieron de $BASELINE"
        echo "    Posibles causas:"
        echo "      - CPU no alcanzó el target ${HPA_TARGET}% (carga insuficiente)"
        echo "      - HPA min/max muy restrictivo"
        echo "      - Cluster sin capacidad para nuevos pods"
        printf "failed" > "$(results.outcome.path)"
      fi
      echo "================================================================"
{{- end }}
