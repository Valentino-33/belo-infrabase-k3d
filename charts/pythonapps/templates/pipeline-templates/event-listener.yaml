{{- if .Values.tekton.enabled }}
apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: github-tag-listener
  namespace: tekton-pipelines
spec:
  serviceAccountName: tekton-triggers-sa
  triggers:
  - name: github-tag-push
    interceptors:
    - ref:
        name: "cel"
        kind: ClusterInterceptor
      params:
      - name: filter
        # Require 5-segment tag: refs/tags/<env>/<strategy>/<semver>
        value: "header.match('X-Github-Event', 'push') && body.ref.startsWith('refs/tags/') && body.ref.split('/').size() >= 5"
      - name: overlays
        value:
        - key: environment
          expression: "body.ref.split('/')[2]"
        - key: strategy
          expression: "body.ref.split('/')[3]"
        - key: image_tag
          # refs/tags/dev/rollingupdate/v1.0.0 → split → [refs,tags,dev,rollingupdate,v1.0.0] → index 4
          expression: "body.ref.split('/')[4]"
        - key: git_revision
          # Full tag ref for git checkout (e.g. refs/tags/dev/rollingupdate/v1.0.0)
          expression: "body.ref"
    bindings:
    - ref: github-tag-binding
    template:
      ref: pythonapps-trigger-template
---
# Ingress para recibir webhooks desde GitHub (expuesto via NodePort 8888)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tekton-event-listener
  namespace: tekton-pipelines
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: tekton-webhook.localhost
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: el-github-tag-listener
            port:
              number: 8080
{{- end }}
