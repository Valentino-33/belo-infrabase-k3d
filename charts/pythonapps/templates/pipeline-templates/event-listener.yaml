apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: github-tag-listener
  namespace: tekton-pipelines
spec:
  serviceAccountName: tekton-triggers-sa
  triggers:
  - name: github-tag-push
    interceptors:
    - ref:
        name: "cel"
        kind: ClusterInterceptor
      params:
      - name: filter
        value: "header.match('X-Github-Event', 'push') && body.ref.startsWith('refs/tags/')"
      - name: overlays
        value:
        - key: image_tag
          expression: "body.ref.split('/')[2]"
    bindings:
    - ref: github-tag-binding
    template:
      ref: pythonapps-trigger-template
---
# Ingress para recibir webhooks desde GitHub (expuesto via NodePort 8888)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tekton-event-listener
  namespace: tekton-pipelines
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: tekton-webhook.localhost
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: el-github-tag-listener
            port:
              number: 8080
