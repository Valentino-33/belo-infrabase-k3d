{{- if .Values.tekton.enabled }}
apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: github-tag-listener
  namespace: tekton-pipelines
spec:
  serviceAccountName: tekton-triggers-sa
  triggers:
  # Trigger 1: tags `refs/tags/release/<semver>/<envs>[/loadtest=<bool>]` → pipeline de release (6 stages)
  #
  # Formatos válidos:
  #   refs/tags/release/v1.0.0/dev                   → loadtest=false (default conservador)
  #   refs/tags/release/v1.0.0/dev/loadtest=true     → corre k6 load test + promote según resultado
  #   refs/tags/release/v1.0.0/dev/loadtest=false    → skipea k6 + auto-promote (release rápido)
  #
  # El default `false` es deliberado: load-test fuerza HPA scale y "ensucia" el flujo
  # del Rollout — sólo se activa cuando explícitamente se pide. Para validar capacidad
  # bajo carga, usar el pipeline burn (`refs/tags/burn/<env>`) que es independiente.
  - name: github-tag-release
    interceptors:
    - ref:
        name: "cel"
        kind: ClusterInterceptor
      params:
      - name: filter
        # refs/tags/release/<ver>            → split = 4 elementos
        # refs/tags/release/<ver>/<env>      → split = 5 elementos
        # refs/tags/release/<ver>/<env>/loadtest=<bool> → split = 6 elementos
        value: "header.match('X-Github-Event', 'push') && body.ref.startsWith('refs/tags/release/') && body.ref.split('/').size() >= 4 && body.ref.split('/').size() <= 6"
      - name: overlays
        value:
        - key: image_tag
          # split → [refs, tags, release, <ver>, <env>?, <loadtest>?] → index 3
          expression: "body.ref.split('/')[3]"
        - key: environments
          # Index 4: comma-separated envs. Default 'dev' si no presente.
          expression: "body.ref.split('/').size() > 4 ? body.ref.split('/')[4] : 'dev'"
        - key: run_load_test
          # Index 5 opcional con formato exacto `loadtest=true|false`. Default 'false' si ausente
          # o si la sintaxis no matchea — fail-closed para no correr k6 por accidente.
          expression: "body.ref.split('/').size() > 5 && body.ref.split('/')[5] == 'loadtest=true' ? 'true' : 'false'"
        - key: git_revision
          expression: "body.ref"
    bindings:
    - ref: github-tag-binding
    template:
      ref: pythonapps-trigger-template

  # Trigger 2: tags `refs/tags/burn/<env>` → pipeline de capacity test (2 stages, on-demand)
  # Es un trigger SEPARADO con su propio binding + template para que la separación
  # de pipelines quede explícita: ningún param compartido entre release y burn.
  - name: github-tag-burn
    interceptors:
    - ref:
        name: "cel"
        kind: ClusterInterceptor
      params:
      - name: filter
        # Format: refs/tags/burn/<env> → 4 segmentos exactos
        value: "header.match('X-Github-Event', 'push') && body.ref.startsWith('refs/tags/burn/') && body.ref.split('/').size() == 4"
      - name: overlays
        value:
        - key: burn_env
          # refs/tags/burn/dev → split → [refs,tags,burn,dev] → index 3
          expression: "body.ref.split('/')[3]"
        - key: git_revision
          expression: "body.ref"
    bindings:
    - ref: github-burn-binding
    template:
      ref: pythonapps-burn-trigger-template
---
# Ingress para recibir webhooks desde GitHub (expuesto via NodePort 8888)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tekton-event-listener
  namespace: tekton-pipelines
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: tekton-webhook.localhost
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: el-github-tag-listener
            port:
              number: 8080
{{- end }}
