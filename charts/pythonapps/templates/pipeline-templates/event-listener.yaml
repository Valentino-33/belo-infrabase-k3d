{{- if .Values.tekton.enabled }}
apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: github-tag-listener
  namespace: tekton-pipelines
spec:
  serviceAccountName: tekton-triggers-sa
  triggers:
  # Trigger 1: tags `refs/tags/release/<semver>/<envs>` → pipeline de release (6 stages)
  - name: github-tag-release
    interceptors:
    - ref:
        name: "cel"
        kind: ClusterInterceptor
      params:
      - name: filter
        value: "header.match('X-Github-Event', 'push') && body.ref.startsWith('refs/tags/release/') && body.ref.split('/').size() >= 4"
      - name: overlays
        value:
        - key: image_tag
          # refs/tags/release/v1.0.0/dev → split → [refs,tags,release,v1.0.0,dev] → index 3
          expression: "body.ref.split('/')[3]"
        - key: environments
          # Optional 5th segment: comma-separated envs. Default to 'dev' if absent.
          expression: "body.ref.split('/').size() > 4 ? body.ref.split('/')[4] : 'dev'"
        - key: git_revision
          expression: "body.ref"
    bindings:
    - ref: github-tag-binding
    template:
      ref: pythonapps-trigger-template

  # Trigger 2: tags `refs/tags/burn/<env>` → pipeline de capacity test (2 stages, on-demand)
  # Es un trigger SEPARADO con su propio binding + template para que la separación
  # de pipelines quede explícita: ningún param compartido entre release y burn.
  - name: github-tag-burn
    interceptors:
    - ref:
        name: "cel"
        kind: ClusterInterceptor
      params:
      - name: filter
        # Format: refs/tags/burn/<env> → 4 segmentos exactos
        value: "header.match('X-Github-Event', 'push') && body.ref.startsWith('refs/tags/burn/') && body.ref.split('/').size() == 4"
      - name: overlays
        value:
        - key: burn_env
          # refs/tags/burn/dev → split → [refs,tags,burn,dev] → index 3
          expression: "body.ref.split('/')[3]"
        - key: git_revision
          expression: "body.ref"
    bindings:
    - ref: github-burn-binding
    template:
      ref: pythonapps-burn-trigger-template
---
# Ingress para recibir webhooks desde GitHub (expuesto via NodePort 8888)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tekton-event-listener
  namespace: tekton-pipelines
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: tekton-webhook.localhost
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: el-github-tag-listener
            port:
              number: 8080
{{- end }}
