{{- if .Values.tekton.enabled }}
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: bump-gitops-image
  namespace: tekton-pipelines
spec:
  params:
  - name: gitops-repo-url
    type: string
  - name: app-name
    type: string
  - name: environments
    type: string
    description: "Comma-separated list: dev,staging,production"
    default: dev
  - name: image-tag
    type: string
  - name: git-user-name
    default: "tekton-bot"
    type: string
  - name: git-user-email
    default: "tekton@belo-challenge.dev"
    type: string
  workspaces:
  - name: gitops
  results:
  - name: commit-sha
    description: "Full SHA of the bump commit (empty string if no changes)"
  volumes:
  - name: git-token
    secret:
      secretName: github-token
      items:
      - key: token
        path: token
  stepTemplate:
    env:
    - name: HOME
      value: /tekton/home
    securityContext:
      runAsNonRoot: true
      runAsUser: 65532
      runAsGroup: 65532
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      seccompProfile:
        type: RuntimeDefault
  steps:
  - name: clone-gitops
    image: alpine/git:latest
    volumeMounts:
    - name: git-token
      mountPath: /workspace/git-token
      readOnly: true
    script: |
      #!/bin/sh
      set -e
      TOKEN=$(tr -d '[:space:]' < /workspace/git-token/token)
      AUTH_URL=$(echo "$(params.gitops-repo-url)" | sed "s|https://|https://x-access-token:${TOKEN}@|")
      git clone "$AUTH_URL" "$(workspaces.gitops.path)/gitops"
      echo "Gitops clonado"

  - name: bump-all-envs
    image: mikefarah/yq:latest
    env:
    - name: IMAGE_TAG
      value: "$(params.image-tag)"
    - name: ENVIRONMENTS
      value: "$(params.environments)"
    - name: APP_NAME
      value: "$(params.app-name)"
    script: |
      #!/bin/sh
      set -e
      # Split comma-separated environments and update each values file
      echo "$ENVIRONMENTS" | tr ',' '\n' | while read ENV; do
        ENV=$(echo "$ENV" | tr -d ' ')
        VALUES_FILE="$(workspaces.gitops.path)/gitops/charts/pythonapps/apps/${APP_NAME}/${ENV}/values.yaml"
        if [ ! -f "$VALUES_FILE" ]; then
          echo "WARN: $VALUES_FILE no encontrado — skipping env=$ENV"
          continue
        fi
        yq e '.image.tag = strenv(IMAGE_TAG)' -i "$VALUES_FILE"
        echo "Bump OK: $APP_NAME/$ENV → image.tag=$IMAGE_TAG"
      done

  - name: commit-and-push
    image: alpine/git:latest
    volumeMounts:
    - name: git-token
      mountPath: /workspace/git-token
      readOnly: true
    script: |
      #!/bin/sh
      set -e
      TOKEN=$(tr -d '[:space:]' < /workspace/git-token/token)
      cd "$(workspaces.gitops.path)/gitops"
      git config user.name "$(params.git-user-name)"
      git config user.email "$(params.git-user-email)"
      git add .
      if git diff --staged --quiet; then
        echo "Sin cambios que commitear"
        printf "" > "$(results.commit-sha.path)"
        exit 0
      fi
      ENVS_LABEL=$(echo "$(params.environments)" | tr ',' '+')
      git commit -m "bump $(params.app-name) a $(params.image-tag) en [${ENVS_LABEL}]"
      # Compute push URL from the pristine pipeline param to avoid doubling
      # the token (origin remote already contains auth from the clone step).
      PUSH_URL=$(echo "$(params.gitops-repo-url)" | sed "s|https://|https://x-access-token:${TOKEN}@|")
      git push "$PUSH_URL" main
      SHA=$(git rev-parse HEAD)
      printf "%s" "$SHA" > "$(results.commit-sha.path)"
      echo "Commit SHA: $SHA"
{{- end }}
