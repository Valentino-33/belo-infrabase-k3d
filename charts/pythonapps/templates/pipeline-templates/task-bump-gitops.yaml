{{- if .Values.tekton.enabled }}
# Actualiza el tag de imagen en el values del ambiente y hace commit + push.
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: bump-gitops-image
  namespace: tekton-pipelines
spec:
  params:
  - name: gitops-repo-url
    type: string
  - name: app-name
    type: string
  - name: environment
    type: string
  - name: image-tag
    type: string
  - name: strategy
    type: string
    default: rollingupdate
  - name: git-user-name
    default: "tekton-bot"
    type: string
  - name: git-user-email
    default: "tekton@belo-challenge.dev"
    type: string
  workspaces:
  - name: gitops
  volumes:
  - name: git-token
    secret:
      secretName: github-token
      items:
      - key: token
        path: token
  steps:
  - name: clone-gitops
    image: alpine/git:latest
    volumeMounts:
    - name: git-token
      mountPath: /workspace/git-token
      readOnly: true
    script: |
      #!/bin/sh
      set -e
      TOKEN=$(cat /workspace/git-token/token)
      # Inject token into URL so git push in later step is authenticated.
      AUTH_URL=$(echo "$(params.gitops-repo-url)" | sed "s|https://|https://x-access-token:${TOKEN}@|")
      git clone "$AUTH_URL" "$(workspaces.gitops.path)/gitops"
      echo "Gitops clonado"

  - name: bump-tag
    image: mikefarah/yq:latest
    env:
    - name: IMAGE_TAG
      value: "$(params.image-tag)"
    - name: STRATEGY
      value: "$(params.strategy)"
    script: |
      #!/bin/sh
      set -e
      VALUES_FILE="$(workspaces.gitops.path)/gitops/charts/pythonapps/apps/$(params.app-name)/$(params.environment)/values-$(params.app-name)-$(params.environment).yaml"
      if [ ! -f "$VALUES_FILE" ]; then
        echo "WARN: $VALUES_FILE no encontrado, skipping bump"
        exit 0
      fi
      # Actualiza image.tag y rollout.strategy juntos — ambos determinan qué despliega ArgoCD.
      yq e '.image.tag = strenv(IMAGE_TAG)' -i "$VALUES_FILE"
      yq e '.rollout.strategy = strenv(STRATEGY)' -i "$VALUES_FILE"
      echo "Bump OK: image.tag=$IMAGE_TAG  rollout.strategy=$STRATEGY"
      echo "Archivo: $VALUES_FILE"

  - name: commit-and-push
    image: alpine/git:latest
    script: |
      #!/bin/sh
      set -e
      cd "$(workspaces.gitops.path)/gitops"
      git config user.name "$(params.git-user-name)"
      git config user.email "$(params.git-user-email)"
      git add .
      if git diff --staged --quiet; then
        echo "Sin cambios que commitear"
        exit 0
      fi
      git commit -m "bump $(params.app-name) a $(params.image-tag) en $(params.environment)"
      git push origin main
{{- end }}
