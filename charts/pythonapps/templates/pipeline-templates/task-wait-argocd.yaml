{{- if .Values.tekton.enabled }}
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: wait-argocd-sync
  namespace: tekton-pipelines
spec:
  description: |
    Stage 4 — garantiza que el Stage 5 (load test) corra sobre la versión
    NUEVA, no la vieja. Verifica:
      (a) ArgoCD aplicó EL commit del Stage 3 (sync.revision == commit-sha)
      (b) Rollout.spec.image-tag == tag esperado
      (c) Rollout en el estado correcto según strategy + modo:
          - rollingupdate           → phase=Healthy
          - BG/Canary modo LEGACY   → phase=Paused (espera promote del pipeline)
          - BG/Canary modo ENTERPRISE → RS nuevo ready (updatedReplicas>=1).
            NO espera Paused: con autoPromotionEnabled=true + análisis, el
            Rollout no pausa — corre el AnalysisRun y promueve solo. El Stage 5
            (k6) genera tráfico EN PARALELO para que el análisis tenga data.
    Auto-detecta strategy y modo del live Rollout y emite strategy como result.
  params:
  - name: app-name
    type: string
  - name: environments
    type: string
    default: dev
  - name: timeout-seconds
    default: "600"
    type: string
  - name: expected-commit-sha
    type: string
    default: ""
  - name: image-tag
    type: string
    default: ""
  results:
  - name: primary-env
    description: "First environment in the list"
  - name: strategy
    description: "Detected rollout strategy: bluegreen, canary, or rollingupdate"
  stepTemplate:
    env:
    - name: HOME
      value: /tekton/home
    securityContext:
      runAsNonRoot: true
      runAsUser: 65532
      runAsGroup: 65532
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      seccompProfile:
        type: RuntimeDefault
  steps:
  - name: wait-argocd
    image: bitnami/kubectl:latest
    script: |
      #!/bin/sh
      set -e
      PRIMARY_ENV=$(echo "$(params.environments)" | cut -d',' -f1 | tr -d ' ')
      printf "%s" "$PRIMARY_ENV" > "$(results.primary-env.path)"

      APP="$(params.app-name)"
      APP_CR="${APP}-${PRIMARY_ENV}"
      TIMEOUT=$(params.timeout-seconds)
      EXPECTED_SHA="$(params.expected-commit-sha)"
      ELAPSED=0

      echo "================================================================"
      echo "  STAGE 4 — wait-argocd-sync (step 1/2: wait-argocd)"
      echo "================================================================"
      echo "  ArgoCD app:        $APP_CR (en namespace argocd)"
      echo "  Primary env:       $PRIMARY_ENV"
      echo "  Expected commit:   ${EXPECTED_SHA:-<cualquiera>}"
      echo "  Timeout:           ${TIMEOUT}s"
      echo "================================================================"

      if [ -n "$EXPECTED_SHA" ]; then
        echo "→ Force-refresh ArgoCD (sin esperar polling de 3min default)..."
        kubectl annotate application "$APP_CR" -n argocd \
          argocd.argoproj.io/refresh=normal --overwrite >/dev/null 2>&1 || true
      fi

      echo "→ Polling app.status.sync hasta que aplique el commit esperado..."
      while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
        STATUS=$(kubectl get application "$APP_CR" -n argocd \
          -o jsonpath='{.status.sync.status},{.status.health.status},{.status.sync.revision}' 2>/dev/null \
          || echo "Unknown,Unknown,")
        SYNC=$(echo "$STATUS" | cut -d',' -f1)
        HEALTH=$(echo "$STATUS" | cut -d',' -f2)
        REVISION=$(echo "$STATUS" | cut -d',' -f3)
        echo "  [${ELAPSED}s] sync=$SYNC health=$HEALTH revision=${REVISION:0:12}"
        if [ "$SYNC" = "Synced" ]; then
          if [ -z "$EXPECTED_SHA" ] || [ "$REVISION" = "$EXPECTED_SHA" ]; then
            echo "  ✓ ArgoCD $APP_CR Synced en revision=${REVISION:0:12} (health=$HEALTH)"
            break
          fi
          echo "    (synced pero en revision vieja, esperando $EXPECTED_SHA)"
        fi
        sleep 5
        ELAPSED=$((ELAPSED + 5))
      done
      if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
        echo "  ✗ TIMEOUT: ArgoCD $APP_CR no sincó a $EXPECTED_SHA en ${TIMEOUT}s"
        exit 1
      fi

  - name: detect-strategy-and-wait-rollout
    image: bitnami/kubectl:latest
    script: |
      #!/bin/sh
      set -e
      PRIMARY_ENV=$(echo "$(params.environments)" | cut -d',' -f1 | tr -d ' ')
      APP="$(params.app-name)"
      NS="${APP}-${PRIMARY_ENV}"
      ROLLOUT="${APP}-${PRIMARY_ENV}"
      TIMEOUT=$(params.timeout-seconds)
      ELAPSED=0

      echo "================================================================"
      echo "  STAGE 4 — wait-argocd-sync (step 2/2: detect strategy + wait)"
      echo "================================================================"
      echo "  Rollout:    $ROLLOUT"
      echo "  Namespace:  $NS"
      echo "  Expecting image-tag: $(params.image-tag)"
      echo "================================================================"

      echo "→ Auto-detectando strategy del live Rollout..."
      if kubectl get rollout "$ROLLOUT" -n "$NS" \
          -o jsonpath='{.spec.strategy.blueGreen.activeService}' 2>/dev/null | grep -q .; then
        STRATEGY="bluegreen"
      elif kubectl get rollout "$ROLLOUT" -n "$NS" \
          -o jsonpath='{.spec.strategy.canary.steps}' 2>/dev/null | grep -q .; then
        STRATEGY="canary"
      else
        STRATEGY="rollingupdate"
      fi
      printf "%s" "$STRATEGY" > "$(results.strategy.path)"
      echo "  ✓ Strategy detectada: $STRATEGY"

      # Detección de modo: enterprise (Argo decide vía AnalysisRun) vs legacy.
      # BG → prePromotionAnalysis definida. Canary → algún step con .analysis.
      MODE="legacy"
      case "$STRATEGY" in
        bluegreen)
          kubectl get rollout "$ROLLOUT" -n "$NS" \
            -o jsonpath='{.spec.strategy.blueGreen.prePromotionAnalysis.templates[0].templateName}' 2>/dev/null \
            | grep -q . && MODE="enterprise" ;;
        canary)
          kubectl get rollout "$ROLLOUT" -n "$NS" \
            -o jsonpath='{.spec.strategy.canary.steps[?(@.analysis)].analysis.templates[0].templateName}' 2>/dev/null \
            | grep -q . && MODE="enterprise" ;;
      esac
      echo "  ✓ Modo detectado: $MODE"

      IMAGE_TAG="$(params.image-tag)"

      echo ""
      case "${STRATEGY}/${MODE}" in
        rollingupdate/*)
          echo "→ Esperando que Rollout llegue a Healthy con image-tag=$IMAGE_TAG..."
          echo "  (RollingUpdate no tiene preview — completa directo)"
          ;;
        */legacy)
          echo "→ Esperando que Rollout esté Paused con image-tag=$IMAGE_TAG..."
          echo "  (modo legacy: BG/Canary se quedan en Paused esperando promote del pipeline)"
          ;;
        */enterprise)
          echo "→ Esperando que el RS nuevo (image-tag=$IMAGE_TAG) esté ready..."
          echo "  (modo enterprise: Argo Rollouts corre el AnalysisRun y promueve solo;"
          echo "   NO esperamos Paused. El Stage 5 generará tráfico para el análisis.)"
          ;;
      esac

      while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
        PHASE=$(kubectl get rollout "$ROLLOUT" -n "$NS" \
          -o jsonpath='{.status.phase}' 2>/dev/null || echo "Unknown")
        SPEC_TAG=$(kubectl get rollout "$ROLLOUT" -n "$NS" \
          -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null | sed 's|.*:||')
        REPLICAS=$(kubectl get rollout "$ROLLOUT" -n "$NS" -o jsonpath='{.status.replicas}' 2>/dev/null || echo "?")
        READY=$(kubectl get rollout "$ROLLOUT" -n "$NS" -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "?")
        UPDATED=$(kubectl get rollout "$ROLLOUT" -n "$NS" -o jsonpath='{.status.updatedReplicas}' 2>/dev/null || echo "?")
        echo "  [${ELAPSED}s] phase=$PHASE spec-tag=$SPEC_TAG replicas=$REPLICAS ready=$READY updated=$UPDATED"

        if [ -n "$IMAGE_TAG" ] && [ "$SPEC_TAG" != "$IMAGE_TAG" ]; then
          echo "    (spec aún no refleja el nuevo image-tag, esperando)"
          sleep 5; ELAPSED=$((ELAPSED + 5)); continue
        fi

        case "${STRATEGY}/${MODE}" in
          rollingupdate/*)
            if [ "$PHASE" = "Healthy" ]; then
              echo "  ✓ RollingUpdate completo: phase=Healthy image-tag=$SPEC_TAG"
              echo "================================================================"
              echo "  Stage 4 OK — Stage 5 va a correr smoke.js contra stable svc"
              echo "================================================================"
              exit 0
            fi ;;
          */legacy)
            if [ "$PHASE" = "Paused" ]; then
              echo "  ✓ Rollout Paused con image-tag=$SPEC_TAG — green/canary RS listo"
              echo "================================================================"
              echo "  Stage 4 OK — Stage 5 va a correr load test contra preview"
              echo "================================================================"
              exit 0
            fi ;;
          */enterprise)
            # RS nuevo ready: updatedReplicas >= 1 y al menos ese RS tiene pods listos.
            # No esperamos Paused — Argo ya está corriendo (o por correr) el análisis.
            if [ "$UPDATED" != "?" ] && [ "$UPDATED" -ge 1 ] 2>/dev/null; then
              echo "  ✓ RS nuevo ready (updatedReplicas=$UPDATED, image-tag=$SPEC_TAG)"
              echo "================================================================"
              echo "  Stage 4 OK — Stage 5 genera tráfico mientras Argo corre el AnalysisRun"
              echo "================================================================"
              exit 0
            fi ;;
        esac
        sleep 5
        ELAPSED=$((ELAPSED + 5))
      done

      echo "  ✗ TIMEOUT: Rollout $ROLLOUT no llegó al estado esperado en ${TIMEOUT}s"
      exit 1
{{- end }}
