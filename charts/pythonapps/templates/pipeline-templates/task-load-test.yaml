{{- if .Values.tekton.enabled }}
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: run-load-test
  namespace: tekton-pipelines
spec:
  params:
  - name: app-name
    type: string
  - name: environments
    type: string
    default: dev
  - name: strategy
    type: string
    default: ""
    description: "Auto-detected by wait-argocd — bluegreen, canary, or rollingupdate"
  results:
  - name: outcome
    description: "passed or failed"
  workspaces:
  - name: source
  stepTemplate:
    env:
    - name: HOME
      value: /tekton/home
    securityContext:
      runAsNonRoot: true
      runAsUser: 65532
      runAsGroup: 65532
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      seccompProfile:
        type: RuntimeDefault
  steps:
  - name: run-k6
    image: grafana/k6:latest
    script: |
      #!/bin/sh
      PRIMARY_ENV=$(echo "$(params.environments)" | cut -d',' -f1 | tr -d ' ')
      APP="$(params.app-name)"
      STRATEGY="$(params.strategy)"
      # namespace y nombre de release = app-name + env
      NS="${APP}-${PRIMARY_ENV}"
      RELEASE="${APP}-${PRIMARY_ENV}"
      echo "=== Load test: $APP env=$PRIMARY_ENV strategy=$STRATEGY ==="

      # service port es siempre 8080 (service.yaml lo define fijo)
      BASE_URL="http://${RELEASE}-stable.${NS}.svc.cluster.local:8080"
      PREVIEW_URL="http://${RELEASE}-preview.${NS}.svc.cluster.local:8080"

      case "$STRATEGY" in
        bluegreen)
          SCRIPT="load-bluegreen.js"
          EXTRA="-e PREVIEW_URL=$PREVIEW_URL"
          ;;
        canary)
          SCRIPT="load-canary.js"
          EXTRA="-e BASE_URL=$BASE_URL"
          ;;
        *)
          SCRIPT="smoke.js"
          EXTRA="-e BASE_URL=$BASE_URL"
          ;;
      esac

      SCRIPT_PATH="$(workspaces.source.path)/src/loadtest/$SCRIPT"
      if [ ! -f "$SCRIPT_PATH" ]; then
        echo "WARN: $SCRIPT_PATH not found — skipping, outcome=passed"
        printf "passed" > "$(results.outcome.path)"
        exit 0
      fi

      OUTCOME="passed"
      if ! k6 run $EXTRA "$SCRIPT_PATH"; then
        OUTCOME="failed"
        echo "=== Load test FAILED ==="
      else
        echo "=== Load test PASSED ==="
      fi
      printf "%s" "$OUTCOME" > "$(results.outcome.path)"
{{- end }}
