{{- if .Values.tekton.enabled }}
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: run-load-test
  namespace: tekton-pipelines
spec:
  description: |
    Stage 5 — k6 load test contra preview svc (BG/Canary) o stable svc
    (RollingUpdate). El script viene del repo de la app (Stage 1 lo clonó).
    Emite outcome=passed|failed para que Stage 6 decida promote vs abort.

    Doble rol según el modo del Rollout:

      MODO LEGACY (Rollout sin AnalysisTemplate):
        El k6 VALIDA. Gating por `enabled`: si false, skipea k6 y emite
        outcome=passed (auto-promote). El flag loadtest del tag lo controla.

      MODO ENTERPRISE (Rollout con prePromotionAnalysis / steps.analysis):
        El k6 GENERA TRÁFICO para que el AnalysisRun de Argo Rollouts tenga
        data en Prometheus. Acá el k6 NO es opcional — sin tráfico, el análisis
        da NaN y el Rollout queda Degraded. Por eso en modo enterprise el k6
        corre SIEMPRE, ignorando `enabled`. La decisión promote/abort la toma
        Argo (no este task ni el outcome que emite).
  params:
  - name: app-name
    type: string
  - name: environments
    type: string
    default: dev
  - name: strategy
    type: string
    default: ""
    description: "Auto-detectada por wait-argocd"
  - name: enabled
    type: string
    default: "false"
    description: |
      "true" → corre k6 contra preview/stable según strategy.
      "false" (default) → skipea k6 y emite outcome=passed para auto-promote.
      Controlado por el 5º segmento del tag: `release/<ver>/<env>/loadtest=true`.
  results:
  - name: outcome
    description: "passed o failed"
  workspaces:
  - name: source
  stepTemplate:
    env:
    - name: HOME
      value: /tekton/home
    securityContext:
      runAsNonRoot: true
      runAsUser: 65532
      runAsGroup: 65532
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      seccompProfile:
        type: RuntimeDefault
  steps:
  # Step 1: detectar si el Rollout está en modo enterprise (tiene AnalysisTemplate
  # configurado). El step k6 no tiene kubectl, así que la introspección va acá y
  # el resultado se escribe a un archivo del workspace que el step k6 lee.
  - name: detect-mode
    image: bitnami/kubectl:latest
    script: |
      #!/bin/sh
      PRIMARY_ENV=$(echo "$(params.environments)" | cut -d',' -f1 | tr -d ' ')
      APP="$(params.app-name)"
      ROLLOUT="${APP}-${PRIMARY_ENV}"
      NS="${APP}-${PRIMARY_ENV}"
      STRATEGY="$(params.strategy)"
      MODE="legacy"
      case "$STRATEGY" in
        bluegreen)
          kubectl get rollout "$ROLLOUT" -n "$NS" \
            -o jsonpath='{.spec.strategy.blueGreen.prePromotionAnalysis.templates[0].templateName}' 2>/dev/null \
            | grep -q . && MODE="enterprise" ;;
        canary)
          kubectl get rollout "$ROLLOUT" -n "$NS" \
            -o jsonpath='{.spec.strategy.canary.steps[?(@.analysis)].analysis.templates[0].templateName}' 2>/dev/null \
            | grep -q . && MODE="enterprise" ;;
      esac
      printf "%s" "$MODE" > "$(workspaces.source.path)/.rollout-mode"
      echo "Rollout mode detectado: $MODE (escrito a .rollout-mode)"

  - name: run-k6
    image: grafana/k6:latest
    script: |
      #!/bin/sh
      PRIMARY_ENV=$(echo "$(params.environments)" | cut -d',' -f1 | tr -d ' ')
      APP="$(params.app-name)"
      STRATEGY="$(params.strategy)"
      ENABLED="$(params.enabled)"
      NS="${APP}-${PRIMARY_ENV}"
      RELEASE="${APP}-${PRIMARY_ENV}"
      MODE=$(cat "$(workspaces.source.path)/.rollout-mode" 2>/dev/null || echo "legacy")

      # En modo enterprise el k6 GENERA TRÁFICO para el AnalysisRun de Argo —
      # no es opcional. Forzamos enabled=true ignorando el flag del tag: sin
      # tráfico el análisis da NaN y el Rollout queda Degraded.
      if [ "$MODE" = "enterprise" ] && [ "$ENABLED" != "true" ]; then
        echo "→ Rollout en modo ENTERPRISE: el k6 es generador de tráfico del"
        echo "  AnalysisRun. Forzando enabled=true (ignorando flag loadtest del tag)."
        ENABLED="true"
      fi

      # Gating LEGACY: si el tag no pidió loadtest=true, skipeamos k6 y auto-promovemos.
      # Releases "limpios" no fuerzan HPA scale ni dejan rastro en el Rollout.
      if [ "$ENABLED" != "true" ]; then
        echo "================================================================"
        echo "  STAGE 5 — run-load-test (SKIPPED)"
        echo "================================================================"
        echo "  App:      $APP"
        echo "  Env:      $PRIMARY_ENV"
        echo "  Strategy: $STRATEGY"
        echo "  Mode:     $MODE"
        echo "  Reason:   tag flag loadtest=true no presente (enabled=$ENABLED)"
        echo "  Outcome:  passed (auto-promote en Stage 6)"
        echo ""
        echo "  Para correr k6 contra este release, retaggear como:"
        echo "    release/<ver>/${PRIMARY_ENV}/loadtest=true"
        echo "================================================================"
        printf "passed" > "$(results.outcome.path)"
        exit 0
      fi

      BASE_URL="http://${RELEASE}-stable.${NS}.svc.cluster.local:8080"
      PREVIEW_URL="http://${RELEASE}-preview.${NS}.svc.cluster.local:8080"

      case "$STRATEGY" in
        bluegreen)
          SCRIPT="load-bluegreen.js"
          EXTRA="-e PREVIEW_URL=$PREVIEW_URL"
          TARGET_DESC="PREVIEW svc → green RS (versión nueva, sin tráfico real)"
          TARGET_URL="$PREVIEW_URL"
          ;;
        canary)
          SCRIPT="load-canary.js"
          EXTRA="-e BASE_URL=$BASE_URL"
          TARGET_DESC="STABLE svc con traffic split → mezcla stable + canary"
          TARGET_URL="$BASE_URL"
          ;;
        *)
          SCRIPT="smoke.js"
          EXTRA="-e BASE_URL=$BASE_URL"
          TARGET_DESC="STABLE svc → RollingUpdate ya completó"
          TARGET_URL="$BASE_URL"
          ;;
      esac

      SCRIPT_PATH="$(workspaces.source.path)/src/loadtest/$SCRIPT"

      echo "================================================================"
      echo "  STAGE 5 — run-load-test"
      echo "================================================================"
      echo "  App:        $APP"
      echo "  Env:        $PRIMARY_ENV"
      echo "  Namespace:  $NS"
      echo "  Strategy:   $STRATEGY"
      echo "  Script:     $SCRIPT (en $SCRIPT_PATH)"
      echo "  Target:     $TARGET_DESC"
      echo "  Target URL: $TARGET_URL"
      echo "  Tool:       k6 (in-cluster, grafana/k6:latest)"
      echo "================================================================"

      if [ ! -f "$SCRIPT_PATH" ]; then
        # FAIL FAST — no permitimos pipelines verdes sin haber testeado.
        echo "  ✗ ERROR: $SCRIPT_PATH NO ENCONTRADO"
        echo ""
        echo "  Causa probable: el chart Helm declara strategy=$STRATEGY"
        echo "  pero el repo de la app no tiene loadtest/$SCRIPT"
        echo ""
        echo "  Solución: agregar $SCRIPT al repo de la app y re-disparar."
        printf "failed" > "$(results.outcome.path)"
        exit 1
      fi

      echo "→ Ejecutando: k6 run $EXTRA $SCRIPT_PATH"
      echo "================================================================"

      OUTCOME="passed"
      if ! k6 run $EXTRA "$SCRIPT_PATH"; then
        OUTCOME="failed"
        echo ""
        echo "================================================================"
        echo "  ✗ Stage 5 FAILED — k6 thresholds no se cumplieron"
        echo "================================================================"
        echo "  Stage 6 va a ejecutar ABORT (kubectl patch spec.abort=true)"
        echo "  El RS nuevo será destruido; stable queda intacto."
        echo "================================================================"
      else
        echo ""
        echo "================================================================"
        echo "  ✓ Stage 5 PASSED — k6 thresholds OK"
        echo "================================================================"
        echo "  Stage 6 va a ejecutar PROMOTE para strategy=$STRATEGY"
        echo "================================================================"
      fi
      printf "%s" "$OUTCOME" > "$(results.outcome.path)"
{{- end }}
