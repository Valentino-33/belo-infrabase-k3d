{{- if .Values.tekton.enabled }}
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: pythonapps-pipeline
  namespace: tekton-pipelines
spec:
  params:
  - name: repo-url
    type: string
  - name: revision
    type: string
    default: main
  - name: app-name
    type: string
  - name: image-tag
    type: string
  - name: image-full
    type: string
    description: "imagen completa: docker.io/user/app:tag"
  - name: environment
    type: string
    default: dev
  - name: strategy
    type: string
    default: rollingupdate
  - name: gitops-repo-url
    type: string
  - name: base-url
    type: string
    default: ""
  - name: preview-url
    type: string
    default: ""
  workspaces:
  - name: source
  - name: gitops

  tasks:
  # Stage 1: clone app source at the exact tag ref
  - name: clone
    taskRef:
      name: git-clone-app
    workspaces:
    - name: output
      workspace: source
    params:
    - name: url
      value: $(params.repo-url)
    - name: revision
      value: $(params.revision)

  # Stage 2: build image with Kaniko and push to Docker Hub
  - name: build-push
    taskRef:
      name: kaniko-build-push
    runAfter: [clone]
    workspaces:
    - name: source
      workspace: source
    params:
    - name: image
      value: $(params.image-full)
    - name: context
      value: src

  # Stage 3: update image.tag + rollout.strategy in gitops repo and push — triggers ArgoCD sync
  - name: bump-gitops
    taskRef:
      name: bump-gitops-image
    runAfter: [build-push]
    workspaces:
    - name: gitops
      workspace: gitops
    params:
    - name: gitops-repo-url
      value: $(params.gitops-repo-url)
    - name: app-name
      value: $(params.app-name)
    - name: environment
      value: $(params.environment)
    - name: image-tag
      value: $(params.image-tag)
    - name: strategy
      value: $(params.strategy)

  # Stage 4: poll ArgoCD until Synced+Healthy, then wait for Rollout to Pause
  - name: wait-argocd
    taskRef:
      name: wait-argocd-sync
    runAfter: [bump-gitops]
    params:
    - name: app-name
      value: $(params.app-name)
    - name: environment
      value: $(params.environment)
    - name: strategy
      value: $(params.strategy)

  # Stage 5: k6 load test against preview/stable; always exits 0; emits outcome result
  - name: load-test
    taskRef:
      name: run-load-test
    runAfter: [wait-argocd]
    workspaces:
    - name: source
      workspace: source
    params:
    - name: app-name
      value: $(params.app-name)
    - name: strategy
      value: $(params.strategy)
    - name: preview-url
      value: $(params.preview-url)
    - name: base-url
      value: $(params.base-url)

  # Stage 6: promote or abort based on load test outcome
  - name: promote-rollback
    taskRef:
      name: promote-or-rollback
    runAfter: [load-test]
    params:
    - name: app-name
      value: $(params.app-name)
    - name: environment
      value: $(params.environment)
    - name: strategy
      value: $(params.strategy)
    - name: outcome
      value: $(tasks.load-test.results.outcome)
{{- end }}
