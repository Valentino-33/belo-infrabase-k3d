{{- if .Values.tekton.enabled }}
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: pythonapps-pipeline
  namespace: tekton-pipelines
spec:
  params:
  - name: repo-url
    type: string
  - name: revision
    type: string
    default: main
  - name: app-name
    type: string
  - name: image-tag
    type: string
  - name: image-full
    type: string
  - name: environments
    type: string
    default: dev
    description: "Comma-separated list: dev,staging,production"
  - name: gitops-repo-url
    type: string
  workspaces:
  - name: source
  - name: gitops

  tasks:
  # Stage 1: clone app source at the exact tag ref
  - name: clone
    taskRef:
      name: git-clone-app
    workspaces:
    - name: output
      workspace: source
    params:
    - name: url
      value: $(params.repo-url)
    - name: revision
      value: $(params.revision)

  # Stage 2: build image with Kaniko and push to Docker Hub
  - name: build-push
    taskRef:
      name: kaniko-build-push
    runAfter: [clone]
    workspaces:
    - name: source
      workspace: source
    params:
    - name: image
      value: $(params.image-full)
    - name: context
      value: src

  # Stage 3: update image.tag in ALL requested environments and push one commit
  - name: bump-gitops
    taskRef:
      name: bump-gitops-image
    runAfter: [build-push]
    workspaces:
    - name: gitops
      workspace: gitops
    params:
    - name: gitops-repo-url
      value: $(params.gitops-repo-url)
    - name: app-name
      value: $(params.app-name)
    - name: environments
      value: $(params.environments)
    - name: image-tag
      value: $(params.image-tag)

  # Stage 4: wait for ArgoCD + Rollout on the PRIMARY env (first in list)
  - name: wait-argocd
    taskRef:
      name: wait-argocd-sync
    runAfter: [bump-gitops]
    params:
    - name: app-name
      value: $(params.app-name)
    - name: environments
      value: $(params.environments)
    - name: expected-commit-sha
      value: $(tasks.bump-gitops.results.commit-sha)
    - name: image-tag
      value: $(params.image-tag)

  # Stage 5: k6 load test on the PRIMARY env
  - name: load-test
    taskRef:
      name: run-load-test
    runAfter: [wait-argocd]
    workspaces:
    - name: source
      workspace: source
    params:
    - name: app-name
      value: $(params.app-name)
    - name: environments
      value: $(params.environments)
    - name: strategy
      value: $(tasks.wait-argocd.results.strategy)

  # Stage 6: promote or abort based on outcome
  - name: promote-rollback
    taskRef:
      name: promote-or-rollback
    runAfter: [load-test]
    params:
    - name: app-name
      value: $(params.app-name)
    - name: environments
      value: $(params.environments)
    - name: strategy
      value: $(tasks.wait-argocd.results.strategy)
    - name: outcome
      value: $(tasks.load-test.results.outcome)

  # Stage 7: burn-to-scale — valida HPA generando CPU >70% contra el stable
  # (ya promovido). when-clause: solo si Stage 5 pasó Y no estamos en producción.
  # Si el HPA escala, el deploy queda validado en capacidad además de funcional.
  - name: burn-to-scale
    taskRef:
      name: run-burn-to-scale
    runAfter: [promote-rollback]
    when:
    - input: "$(tasks.load-test.results.outcome)"
      operator: in
      values: ["passed"]
    workspaces:
    - name: source
      workspace: source
    params:
    - name: app-name
      value: $(params.app-name)
    - name: environments
      value: $(params.environments)
    - name: strategy
      value: $(tasks.wait-argocd.results.strategy)
{{- end }}
