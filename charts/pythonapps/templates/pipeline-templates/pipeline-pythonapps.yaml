{{- if .Values.tekton.enabled }}
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: pythonapps-pipeline
  namespace: tekton-pipelines
spec:
  params:
  - name: repo-url
    type: string
  - name: revision
    type: string
    default: main
  - name: app-name
    type: string
  - name: image-tag
    type: string
  - name: image-full
    type: string
  - name: environments
    type: string
    default: dev
    description: "Comma-separated list: dev,staging,production"
  - name: run-load-test
    type: string
    default: "false"
    description: |
      "true" → corre k6 contra preview/stable y promueve según outcome.
      "false" (default) → skipea k6 dentro del stage load-test y auto-promueve
      (outcome=passed). Releases rápidos sin ensuciar el Rollout con HPA scale.
  - name: gitops-repo-url
    type: string
  workspaces:
  - name: source
  - name: gitops

  tasks:
  # Stage 1: clone app source at the exact tag ref
  - name: clone
    taskRef:
      name: git-clone-app
    workspaces:
    - name: output
      workspace: source
    params:
    - name: url
      value: $(params.repo-url)
    - name: revision
      value: $(params.revision)

  # Stage 2: build image with Kaniko and push to Docker Hub
  - name: build-push
    taskRef:
      name: kaniko-build-push
    runAfter: [clone]
    workspaces:
    - name: source
      workspace: source
    params:
    - name: image
      value: $(params.image-full)
    - name: context
      value: src

  # Stage 3: update image.tag in ALL requested environments and push one commit
  - name: bump-gitops
    taskRef:
      name: bump-gitops-image
    runAfter: [build-push]
    workspaces:
    - name: gitops
      workspace: gitops
    params:
    - name: gitops-repo-url
      value: $(params.gitops-repo-url)
    - name: app-name
      value: $(params.app-name)
    - name: environments
      value: $(params.environments)
    - name: image-tag
      value: $(params.image-tag)

  # Stage 4: wait for ArgoCD + Rollout on the PRIMARY env (first in list)
  - name: wait-argocd
    taskRef:
      name: wait-argocd-sync
    runAfter: [bump-gitops]
    params:
    - name: app-name
      value: $(params.app-name)
    - name: environments
      value: $(params.environments)
    - name: expected-commit-sha
      value: $(tasks.bump-gitops.results.commit-sha)
    - name: image-tag
      value: $(params.image-tag)

  # Stage 5: k6 load test on the PRIMARY env (gated por param run-load-test)
  # Si run-load-test=false (default), la task corre pero emite outcome=passed
  # sin ejecutar k6 — auto-promote downstream sin ensuciar el Rollout con HPA scale.
  - name: load-test
    taskRef:
      name: run-load-test
    runAfter: [wait-argocd]
    workspaces:
    - name: source
      workspace: source
    params:
    - name: app-name
      value: $(params.app-name)
    - name: environments
      value: $(params.environments)
    - name: strategy
      value: $(tasks.wait-argocd.results.strategy)
    - name: enabled
      value: $(params.run-load-test)

  # Stage 6: promote or abort based on outcome
  # Stage final del release pipeline: el promote es el "dueño de la verdad".
  # Las validaciones de CAPACIDAD (burn-to-scale / HPA) viven en un pipeline
  # SEPARADO (pythonapps-burn-pipeline) que se dispara on-demand vía tag
  # `refs/tags/burn/<env>` o vía `make burn-test`. Razones:
  #   - HPA cambia poco; validarlo en cada release es over-testing.
  #   - Burn-to-scale tiene problemas técnicos si corre durante BG pause:
  #     el HPA promedia CPU entre stable+preview RSes → la dilución impide
  #     ver scale-up aunque el preview esté a 100% CPU.
  #   - Modelo enterprise: capacity tests viven en pipeline de chaos/capacity
  #     separado, no en el de release.
  - name: promote-rollback
    taskRef:
      name: promote-or-rollback
    runAfter: [load-test]
    params:
    - name: app-name
      value: $(params.app-name)
    - name: environments
      value: $(params.environments)
    - name: strategy
      value: $(tasks.wait-argocd.results.strategy)
    - name: outcome
      value: $(tasks.load-test.results.outcome)
{{- end }}
