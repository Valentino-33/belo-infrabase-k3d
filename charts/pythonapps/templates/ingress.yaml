{{- if .Values.ingress.enabled }}
{{- $fullname := include "pythonapps.fullname" . -}}
{{/*
  Topología invariante: stable + preview siempre existen.
  - stable: hostname principal. ArgoRollouts agrega annotations de canary-weight aquí.
  - preview: acceso directo a la nueva versión antes del promote.
  Backend apunta al service port (8080 fijo).
*/}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullname }}-stable
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pythonapps.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.ingressClassName }}
  rules:
  - host: {{ .Values.ingress.hostname }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ $fullname }}-stable
            port:
              number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullname }}-preview
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pythonapps.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: {{ .Values.ingress.ingressClassName }}
  rules:
  - host: preview-{{ .Values.ingress.hostname }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ $fullname }}-preview
            port:
              number: 8080
{{- end }}
