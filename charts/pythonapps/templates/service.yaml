{{- $fullname := include "pythonapps.fullname" . -}}
{{/*
  Topología invariante: stable + preview existen siempre, sin importar la strategy activa.
  service.port es fijo (8080) para que el load test y el ingress usen siempre el mismo puerto.
  service.targetPort = ports.containerPort (configurable por app en values.yaml).
*/}}
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-stable
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pythonapps.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "pythonapps.selectorLabels" . | nindent 4 }}
  ports:
  - name: http
    port: 8080
    targetPort: {{ .Values.ports.containerPort }}
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-preview
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pythonapps.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "pythonapps.selectorLabels" . | nindent 4 }}
  ports:
  - name: http
    port: 8080
    targetPort: {{ .Values.ports.containerPort }}
    protocol: TCP
