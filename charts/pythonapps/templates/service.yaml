{{- $fullname := include "pythonapps.fullname" . -}}
{{/*
  Topología invariante: stable + preview existen siempre, sin importar la strategy activa.
  Esto permite cambiar de BlueGreen a Canary entre deploys sin tocar la capa de red.
  ArgoRollouts gestiona los selectores de pods en cada service según la strategy del Rollout.
*/}}
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-stable
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pythonapps.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "pythonapps.selectorLabels" . | nindent 4 }}
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-preview
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pythonapps.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "pythonapps.selectorLabels" . | nindent 4 }}
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
