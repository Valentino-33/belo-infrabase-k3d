# Defaults del chart — cada app DEBE sobreescribir con su <env>/values.yaml
# helm template <release> charts/pythonapps/ -f apps/<app>/<env>/values.yaml

app:
  name: ""           # REQUIRED: definido en <env>/values.yaml
  namespace: ""      # REQUIRED: <appname>-<env> — debe coincidir con destination.namespace en ArgoCD

image:
  repository: ""     # REQUIRED: docker.io/<user>/<app>
  tag: "latest"
  pullPolicy: IfNotPresent

rollout:
  strategy: rollingupdate  # bluegreen | canary | rollingupdate

replicas: 1

ports:
  containerPort: 8080   # puerto en el que escucha el contenedor — sobreescribir por app

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  hostname: ""
  ingressClassName: nginx
  annotations: {}

serviceMonitor:
  enabled: false
  interval: 30s
  pathPrefix: ""
  metricsPath: /metrics

tekton:
  enabled: false   # true solo via make tekton-apply — evita que ArgoCD gestione estos recursos
  dockerhubUser: valentinobruno
  gitopsRepoUrl: https://github.com/Valentino-33/belo-infrabase-k3d
