app:
  name: "webserver-api01"
  namespace: "webserver-api01-dev"
image:
  repository: docker.io/valentinobruno/webserver-api01
  tag: "v0.10.0"
  pullPolicy: IfNotPresent
rollout:
  strategy: bluegreen
# replicas: 3 — el load test ramp hasta 500 VUs satura una BG paused con
# 2/2 pods (preview overload). Con 3 baseline + 3 preview = 6 pods en BG
# pause, c/u con limit 300m → 1.8 cores total. Maneja 500 VUs en preview.
replicas: 3
ports:
  containerPort: 8000
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "300m"
    memory: "256Mi"
# Probes apuntan a /api01/health — el código de api01 NO expone /health a la raíz.
livenessProbe:
  httpGet:
    path: /api01/health
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3
readinessProbe:
  httpGet:
    path: /api01/health
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3
hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 7
  # Target 50% (no 70%): k3d local — queremos ver el HPA gatillar scale-up
  # en la demo. Con 50% basta saturar ~50% del CPU de UN pod para que el
  # promedio del rollout cruce el threshold.
  targetCPUUtilizationPercentage: 50
ingress:
  enabled: true
  hostname: api01.localhost
  ingressClassName: nginx
  # Sin rewrite-target — la app tiene rutas explícitas bajo /api01/*.
  # Si se rewriteara a /, todo caería en 404 (no hay rutas en raíz).
  annotations: {}
serviceMonitor:
  enabled: true
  interval: 30s
  pathPrefix: api01
  metricsPath: /api01/metrics
# Argo Rollouts AnalysisTemplate — pre+postPromotion contra métricas Prometheus.
# Habilitado en dev para ejercitar el path enterprise (autoPromotionEnabled=true,
# scaleDownDelay=120s para dar espacio al postPromotionAnalysis). Si las queries
# success-rate ≥ 0.99 y latency-p95 < 1s pasan → switch automático. Si fallan →
# Rollout Degraded sin promote. El Stage 6 del pipeline solo observa.
analysis:
  enabled: true
  metricPrefix: api01
