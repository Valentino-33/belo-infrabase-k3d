app:
  name: "webserver-api01"
  namespace: "webserver-api01-dev"
image:
  repository: docker.io/valentinobruno/webserver-api01
  tag: "v0.6.0"
  pullPolicy: IfNotPresent
rollout:
  strategy: bluegreen
# minReplicas 2 a propósito: el load test de 1000 VUs satura 1 pod (300m CPU
# limit) antes de que HPA reaccione → 5xx mientras escala. Arrancar con 2
# pods da capacidad de baseline; HPA escala desde ahí si hace falta.
replicas: 2
ports:
  containerPort: 8000
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "300m"
    memory: "256Mi"
# Probes apuntan a /api01/health — el código de api01 NO expone /health a la raíz.
livenessProbe:
  httpGet:
    path: /api01/health
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3
readinessProbe:
  httpGet:
    path: /api01/health
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3
hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 7
  # Target 50% (no 70%): k3d local — queremos ver el HPA gatillar scale-up
  # en la demo. Con 50% basta saturar ~50% del CPU de UN pod para que el
  # promedio del rollout cruce el threshold.
  targetCPUUtilizationPercentage: 50
ingress:
  enabled: true
  hostname: api01.localhost
  ingressClassName: nginx
  # Sin rewrite-target — la app tiene rutas explícitas bajo /api01/*.
  # Si se rewriteara a /, todo caería en 404 (no hay rutas en raíz).
  annotations: {}
serviceMonitor:
  enabled: true
  interval: 30s
  pathPrefix: api01
  metricsPath: /api01/metrics
