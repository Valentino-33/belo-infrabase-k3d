app:
  name: "webserver-api02"
  namespace: "webserver-api02-dev"
image:
  repository: docker.io/valentinobruno/webserver-api02
  tag: "v1.3.0"
  pullPolicy: IfNotPresent
rollout:
  strategy: canary
# replicas: 3 — necesario para que el load test ramp hasta 500 VUs no sature
# antes de que HPA reaccione. En canary los pods se distribuyen entre stable
# y canary RSes según setWeight.
replicas: 3
ports:
  containerPort: 8000
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "300m"
    memory: "256Mi"
# Probes apuntan a /api02/health — el código de api02 NO expone /health a la raíz.
livenessProbe:
  httpGet:
    path: /api02/health
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3
readinessProbe:
  httpGet:
    path: /api02/health
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3
hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 7
  # Target 50% — ver comentario en api01.
  targetCPUUtilizationPercentage: 50
ingress:
  enabled: true
  hostname: api02.localhost
  ingressClassName: nginx
  # Sin rewrite-target — la app tiene rutas explícitas bajo /api02/*.
  annotations: {}
serviceMonitor:
  enabled: true
  interval: 30s
  pathPrefix: api02
  metricsPath: /api02/metrics
# Argo Rollouts AnalysisTemplate — análisis automático en CADA setWeight del canary.
# steps: [5% → analysis → 25% → analysis → 50% → analysis → 100% → postAnalysis].
# Argo Rollouts avanza al siguiente step solo si el análisis previo pasa; aborta
# automáticamente si falla. El Stage 6 del pipeline solo observa phase=Healthy.
analysis:
  enabled: true
  metricPrefix: api02
