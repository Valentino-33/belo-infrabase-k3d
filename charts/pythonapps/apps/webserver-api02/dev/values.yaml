app:
  name: "webserver-api02"
  namespace: "webserver-api02-dev"

image:
  repository: docker.io/valentinobruno/webserver-api02
  tag: "v0.1.0"
  pullPolicy: IfNotPresent

rollout:
  strategy: canary

# minReplicas 2 a propósito: el load test de 1000 VUs satura 1 pod (300m CPU
# limit) antes de que HPA reaccione → 5xx mientras escala. Arrancar con 2
# pods da capacidad de baseline; HPA escala desde ahí si hace falta.
replicas: 2

ports:
  containerPort: 8000

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "300m"
    memory: "256Mi"

# Probes apuntan a /api02/health — el código de api02 NO expone /health a la raíz.
livenessProbe:
  httpGet:
    path: /api02/health
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api02/health
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  hostname: api02.localhost
  ingressClassName: nginx
  # Sin rewrite-target — la app tiene rutas explícitas bajo /api02/*.
  annotations: {}

serviceMonitor:
  enabled: true
  interval: 30s
  pathPrefix: api02
  metricsPath: /api02/metrics
