app:
  name: "webserver-api02"
  namespace: "webserver-api02-production"

image:
  repository: docker.io/valentinobruno/api02
  tag: "latest"
  pullPolicy: IfNotPresent

rollout:
  strategy: canary

replicas: 3

ports:
  containerPort: 8000

resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "1000m"
    memory: "512Mi"

livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 15
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 3

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 60

ingress:
  enabled: true
  hostname: api02.production.localhost
  ingressClassName: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /

serviceMonitor:
  enabled: true
  interval: 15s
  pathPrefix: api02
  metricsPath: /api02/metrics
