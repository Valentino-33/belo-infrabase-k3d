# Ejemplo de Application CR para una nueva app Canary en dev.
# Copiar como: gitops/gitops-core-dev/<nombre-de-tu-app>.yaml
# Reemplazar <nombre-de-tu-app> y hacer git push para que ArgoCD lo detecte.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: <nombre-de-tu-app>-dev
  namespace: argocd
  labels:
    app: <nombre-de-tu-app>
    environment: dev
spec:
  project: default
  source:
    repoURL: https://github.com/<org>/belo-infrabase-k3d
    targetRevision: main
    path: charts/pythonapps
    helm:
      valueFiles:
      - apps/<nombre-de-tu-app>/build-time/app.yaml
      - apps/<nombre-de-tu-app>/dev/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - RespectIgnoreDifferences=true
  ignoreDifferences:
  - group: argoproj.io
    kind: Rollout
    jsonPointers:
    - /spec/replicas
